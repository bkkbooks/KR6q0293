body:
  text: 嗣法門人守詮等編頌古世尊初生一手指天一手指地云天上天下唯我獨尊草木無端拈出來更加注腳放癡呆西天此土誰知己夜半優曇火裏開世尊拈花金色頭陀忽破顏看來也是管窺斑當時若得回頭早免見兒孫墮黑山女子出定出得出不得滿面是埃塵愁人莫向愁人説説向愁人愁殺人疏山造塔鑿開荒徑造浮圖往復商量價不孤無限落華隨水去夕陽春色滿江湖漸源與道吾弔慰急水灘頭下釣時錦鱗紅尾尚遲疑驀然跳出洪波裏霧拏雲宇宙低風幡大海波濤湧千江水逆流龍王宮殿裏不見一人遊喫油糍背衆喫油糍對人誇好手潦倒不識羞抵死揚家醜香嚴上樹故園春色在枝頭惱亂春風卒未休無事晚來江上望三三兩兩釣魚舟丹霞燒木佛丹霞寒燒木佛院主因禍得福可憐杜撰巡官祇管胡卜亂卜舉定山夾山同行定山云生死中無佛則無生死夾山云生死中有佛則不迷生死二人各謂己語親切往大梅舉而質之梅云一親一疏二人下去次日夾山往問那箇親梅云親者不問問者不親夾山住院後舉此謂衆云我當時失却一隻眼苦瓠連根苦甜瓜徹蒂甜兩般滋味惡中後入黃泉真贊贊睦州和尚稽首金容癩狗師一生快活沒人知平田淺草翻身處合水和泥換步時垂手未施三寸刃破關先下頂門槌寥寥萬古誰堪對唯有嘉禾跛腳兒嚴教授畫臨濟請贊喝下忽雷驚聲前休領略當鋒囓鏃時蹉過第一著不在壁立處豈向平地泊野水白連天秋空飛一鶚滿禪人畫臨濟像請贊臨濟禿無眼目討便宜兮不知足高懸羊頭賣狗肉稱頭斤兩惜如玉胸中更有一般毒天下無人敢輕觸卞禪人畫布袋和尚求贊人謂是彌勒且喜沒交涉拖箇破布袋到處納敗闕祇有一味長子細為君説是什麼乾屎橛贊三將軍家在歸宗寺後山洞中春色異人間祇因親受靈山記長與歸宗把要關贊大慧禪師人天之師佛祖膀樣頂𩕳一著匙挑不上俾臨濟價增十倍起圓悟更無伎倆小姪如此贊揚老胡決定有望三十年後脫空話行也是一番性懆起謗贊虎丘先師老漢從來無禪一味心中含毒此毒時復現前渾家大小不穆異口同音呪詛至今活陷地獄一名臨濟正宗一名叢林瞎禿贊佛眼叔祖雪堂和尚侍立老禪贊在前正法眼藏瞎驢邊滅父行子隨了無途轍老禪已是錯針錐添得應庵亂饒舌贊此庵元和尚二佛祖生冤家人天不喜見忒殺聱頭却通一線劈胸拳下破牢關大用機輪轆轆轉十分畫得相似祇有一處誵訛佛祖檢點不出從教平地干戈贊李知府朝議人言公死我言公在在在在何處清風動天籟贊程宗古承務龐居士悟心於馬駒言下裴相國得大用於黃蘗棒頭雖相去數百年間其金聲玉振聯環不斷彼時有此二大老光明烜赫此時有宗古先生仁義禮信根於心而能以此心確然履踐佛祖大解脫門誠不讓耳白雲山月未足為齊寒檜青松堪同大節烏巨山逵長老命立首座持師頂相請贊煙林風姿山嶽氣宇坐看春回行無伴侶不圖成佛豈欲作祖一句掀翻萬機罔措更提柱杖擊塗毒鼓立禪持歸分付烏巨積善普長老請贊天台南石橋北觀音寺裏有彌勒頂門瞎却摩醯眼肘後風雷轟霹靂表微首座請贊左捺膝右握拳捶瞎正法眼打破葛藤禪奮迅西河爪距踢出楊歧金圈祇憑箇一著今古有人傳禪人寫真請贊形枯豈是持齋叟兒古還非入定僧馬又不成驢不是當頭一著得人憎法中之魔僧中之賊盜佛祖寶刀斷衲僧命脈貧窮者示之無價寶珠富貴者令之破家散宅不是平地上干戈且非孤峻處標格者漢初無罪過祗是頭匾眼大雖然肚裏醒醒開口便先話墮如斯出世為人恰似大蟲看水磨竪拂拄拂全機出沒一喝耳聾三日叢林至今狼藉屈屈且道是馬祖屈百丈屈歸宗屈宗一侍者但恁麼拈出魯祖偏工面壁祕魔動便擎杈唯有歸宗長老一味撒土撒沙三箇上牢漆桶不知那箇堪誇諸方檢點得出也是勾賊破家波濤千尺冷颼颼誰向滄溟泛逆流唯有渠儂諳水脈卷舒出沒任遨遊九年面壁成迂曲三頓親承愈見賒併蕩那伽大機手不知誰可繼生涯拭眼堂前臨濟正令且行一半拈佛祖病江上青山千萬疊水邊茆屋兩三間朝來無限扁舟過何似渠儂把釣竿茆屋紫霄下良田石鏡邊此生隨分過不用買山錢這般惡比丘何人敢近傍恣焚三毒火力起無根謗破除少室窠巢併蕩衲僧見障聞者見者攢眉應是無人瞻仰身心一如身外無餘不願成佛亦非凡夫甘作上牢漆桶無心計較錙銖萬古銀山鐵壁更沒者也之乎是則活埋老僧不是則打殺曇慧暗透兩重牢關烈焰不藏蚊蚋元是黃梅村裏僧生來自笑百無能一瓶一鉢隨緣住孰謂而今繼祖燈平江虞祖道寫頂相求贊枯松下盤陀上獨坐大方橫按拄杖謂是應庵無恁相狀謂非應庵誰肯歸向分付祖道試自定當徐伯壽求贊大海波濤闊千峰氣像雄當頭俱坐斷直下展家風一喝分賓主三玄辨正宗其餘都莫問今古有盲聾如道人求贊江上青山疊疊來屋頭松竹手親栽柴門盡日無人到時見窗前雲作堆蓮道人自寫像求贊凌行婆蓮道者一箇患聾一箇患啞聾者善聽啞者能話堪笑堪悲可知禮也吉彬老二姪女繡普賢菩薩求贊吳門吉彬老壽年可及百骨目清且癯施為有標格行步快如風談笑氣不乏窮之無他術一味好佛法每親善知識言下究生殺家有二姪女貞姿逈超拔自幼不茹葷晨昏常燕默從容定中起痛念十使結顯塵劫大願運針發五色幻普賢妙身應現四菩薩等十方虗空皎若揭日月大哉白象王群狐悉彌滅當知妙殊勝豈在別處設若從自己求猶如病作熱如是名正觀不爾是邪説偈頌和宮使李侍郎頌送入莞山庵此山已是勝天台峰頂寥寥正眼開無限水雲難湊泊却容掃地相公來題陳參議中大大隱圖荷鋤居士隱雲莊竹屋茆堂瞰小江祗這逍遙是知己人間天上更無雙和李參政頌示鑒禪者清源居士頂門著從本已來自寥廓更透吾家向上關活鱍鱍地難收捉風塵草動鑒來端臨機八面初無作才起分毫取與心即被邪師籠却贈別俗兄此行安忍泛輕舟無奈官差不自由痛望老人修淨業莫教容易度春秋題劉民用居士藏六庵西溪縛屋稱幽居坐對松窗與世疏到眼青山千萬疊此生安樂更無如虗空正體沒邊涯藏六如何蓋覆伊要聽少林無孔笛從來多是逆風吹辭此庵和尚塔道韻如山重氷懷有紀綱一拳成活業千古更無雙松竹森森老雲山疊疊長洛陽無限意對此一爐香示智道者少室門庭冷似灰長年不見一人來汝今若解知慚愧那取工夫到一回贈成主簿同是崇寧癸未生公為官長我為僧大家履踐通天路共踏毗盧頂上行禪人之梅陽此行不憚三千里況是江天欲雪時問道身心如不昧梅陽老子已先知與鑄鍾道者野店小橋外黃昏欲雪時一聲誰側耳千古喚愚癡德彬修雙陽塔求頌九層塔聳青霄外七佛靈蹤在上方山冷雲寒當午夜唯聞仙樂散天香送僧化席窮心何必在三椽直透歸宗一味禪翻憶當年曾卷起無端又展與人眠吳必東請小參後説偈百草頭邊千聖眼一毫端上萬重關更無佛法并玄妙堪與知音共往還送六人禪者隨宏長老住大智大智荒涼久中興六上人機前施遠略句下要通津事理無兼帶偏圓有主賓風雲今際會彈指一番新贈悟上人造華嚴塔山前馬廄普光殿門外牛欄正覺場五十三人同日葬善財走得腳生瘡術人求頌造化付誰手君來聊解顏欲遊天上路先破鬼門關禍福行藏內高低方寸間毫芒差錯處過犯重如山行者求頌了身不若了心休了得心時身不愁若也身心俱了了神仙何必更封侯觀道人求頌學佛從來境界多不能降伏便成魔降魔能用無心法六賊傾城盡倒戈題仲逸宣教三境圖太清之雲鏡中之塵從無住本廓應如春妙玄不動示現無垠三世普入孰妄孰真現成公案豈費精神當頭一著坐斷要津莞山淨明庵小參示衆三十三州七十僧驢腮馬頷得人憎諸方若具羅籠手今日無因到淨明題永寧小軒我行重到清涼地小室軒窗分外明不是山家占春色大都物理自舒情贈晦叔秀才二首處世從教眼似眉自然心地絶支離翻身更透龍門浪頭角崢嶸宇宙低少室巖前路不遙毫芒才擬便迢迢西湖湖上晚來看小艇輕風落畫橈西蜀祖正道者還鄉求頌西川五十四軍州幾箇男兒會點頭透得劒門關子過不風流處也風流夜宿解田偶成夜宿西山居士家圍爐相對話生涯從來無一絲頭許自是勞生眼裏花送宏監寺開海田軒昂氣宇要爭先及早乘時痛著鞭翻轉江臯千頃浪靈苗從此秀桑田送珣禪還鄉極目澄澄水照空白蘋紅蓼戰西風三千里外深深意鐵券誰將纍祖翁送祥禪人二首子是慈明家畔人直須超卓要驚群騰身快入洪波裏始見曹源正脈分濁港江頭送別時碧雲秋水淡依依莫嫌老拙疏慵甚它日重來扣竹扉謝楊善才道友惠數珠南詢初不失程途收得金剛腦後珠兩手持來親獻我光明炯炯破昏衢胡氏妙圓求頌八年伏枕今安樂安樂常思病苦時苦樂本來真實義要須猛省力扶持送傑侍者還鄉辛未上元日大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便垛根吾有末後著待歸要汝遵佛事為此庵和尚入塔摩醯三眼洞徹無私末後全提今之是也故我此庵和尚平生擔板不受差排會盡物我一如透過生死窠臼履刀山劒樹如步紅蓮入鑊湯爐炭似登寶所全體是箇大解脫門更無一絲毫許外物化緣既畢借路經過火光三昧自焚軀烈焰亘天誰著眼黃金靈骨五色璨然不昧高蹤斬新光彩今日安藏窣堵坐斷溪山萬木生風千江照月真燈烈焰少室增輝正恁麼時且移身換步一句作麼生道還知落處麼寶印當空妙重重錦縫開喝一喝為留守樞密大資掩土天高地厚海闊山遙發最上機示真實相故我留守樞密相公廓頂門正眼顯肘後靈符以此為國為民以此至忠至孝可謂大功不宰果見作家末後全提十虗坐斷無生田地有種有收般若舟航有津有濟直得高超物表獨蹈大方正恁麼時且全身奉重一句作麼生道好須雲外看一劒倚天寒為南書記下火東湖莞嶺及歸宗燁燁騰輝爐鞴中鐵眼銅睛烹不破衲僧巴鼻好流通塔銘附左承議郎太常丞兼權尚書吏部郎官李浩撰隆興改元癸未六月十三日住持天童山應庵禪師曇華遷寂塔全身於院之西麓其侍者興會持遺書副以趙州之頂相來且需文以銘余曰銘余宜為歲在庚午始識師於番陽十四年于今念有所至雖千里命車忽焉去之亦不為少頃留以是為常家居官居其門弟子以化事往還蓋未嘗絶也知師之所歷至詳銘余宜為示之信入導以進步既久而本然之法軒豁呈露靡所逃遁考觀其極與吾儒所謂一貫兩端宗廟之美百官之富無得踰之日月不可階之天無或少戾知師之所造至悉銘余宜為負二宜為最後又以古佛相貌寄意銘余責也其可辭師江氏子蘄之黃梅人生而奇傑骨目聳秀童稚便厭世故具決定志津濟羣品年十七出家於邑之東禪明年為大僧又明年杖錫參訪首謁隨州水南遂和尚染指法味歡喜踴躍遂遍歷湖南北江東西所至與諸老宿激揚無不投契然師根器遠大不肯得少為足要求向上鉗鎚透頂透底諸佛列祖羅籠不住一著以厭滿初願乃上雲居禮圜悟禪師一見拊勞痛與提䇿以為法之故服勞難事趨走惟恐居後會圜悟入蜀指似往見彰教隆于宣隆其子也隆移虎丘師實為先馳未半載間通徹大法頓明圜悟為人處機關深固運用廓言句之出皆越格超量人天罔測道聲藹然洽於叢林未幾禮辭遊戲諸方初分座於處之連雲處守遂以妙嚴請師出世繼住衢之明果蘄之德章饒之報恩薦福婺之寶林報恩江之東林建康之蔣山平江之萬壽兩住南康歸宗末乃住今天童皆緇白歆慕同辭公舉處處開大施門垂手未悟遠近奔湊如水赴壑師於普説小參問答勘辨之屬皆從容暇豫曲盡善巧而室中機辨摻縱殺活尤號明妙飽參宿學一近槌拂亦汗下心死恨見之晚先意出力辦所難集以申報效舊嘗領徒典剎者皆晦匿名迹以得寓巾鉢於下陳為幸嗚呼道亦宏矣師既大振宗風為世眼目至於行業高潔咸可稱述師初有發明即與此庵禪師時號元布袋者同行反覆博約日益深奧及從此庵於護國相得歡甚此庵之亡意於師不無所屬而開堂嗣法訖不忘虎丘與近世眩於名聞牽於利養燒香不原所得者異矣矩範嚴峻或有過失往往面質無所寬假言既脫口亦釋然無間以是學者畏而仰之每於住持泛應虗受雖料理建置小物細故動為無窮計未嘗苟且至纖毫不可於意即翩然徑去莫能回奪嘗自言衲僧家著草鞋住院何啻如蚖蛇戀窟勉厲徒衆不許放逸事事必身率之其將示疾也猶挂牌入室至夜分他日多類是將終或以辭世偈為請師曰吾嘗笑諸方所為而自為之耶區處院事纖悉不遺奄然趺坐而化春秋六十一夏﨟四十三偈頌語録甚富未及詮次已盛傳於世矣徑山妙喜禪師聲價隆重方其顯赫時爭屈之下師執常禮無加損及其在梅陽有僧傳師垂示語者妙喜見之極口稱歎後以偈寄歸宗云坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊歧正脈通其歸重如此逮妙喜還徑山退居明月庵師演化于明叔姪相望往來憧憧必至二大士之門咸曰妙喜應庵無異辭師寂後未踰月妙喜亦化去祖道其遂陵夷矣乎後生可畏菴必將有紹之者銘曰臨際一宗支派分布大於楊歧盛於五祖善美具并厥惟圜悟生子若孫益振門戶師固後出氣雄諸方發端水南遍參湖江所至皆靡陳既堂堂師視缺然高翥遠驤窮法頂底乃梯乃航槌拂巾瓶一十三剎示無緣慈縱無畏説魔族萬千我殺我活驅耕奪飢定動智拔還其本然同此大達太白峯之前玲瓏巖之下有窣堵波靈骨是舍三十年後話行猶是閉眼作夜李侍郎祭文附維隆興元年六月十三日左承議郎太常丞兼權尚書吏部郎官李浩謹以香茶之奠致祭于故天童山應庵禪師和尚嗚呼師遂遷寂矣夫抑世諦流布也弗祭其弗來矣夫祭之果亦至也方其倣徨於水南周旋於江東西湖南北困頓於雲居章教之久如求亡子如喪考妣茲其未悟矣夫抑未嘗不巍巍堂堂煒煒煌煌也已而獨踞道場一十有五説法如雷如風奔走衲僧如鳳如麟茲其既悟矣夫亦未嘗不跛跛挈挈百醜千拙也烹鍛諸佛其無功矣夫抑最上上之功也呵咄列祖是無德矣夫亦無等等之德也走之於師爰自相視而笑授受兩忘昔不為初學今不為宿習淮江異出不為阻儒釋異容不為間時從杖屨日瞻槌拂不為親曠紀彌年元字腳不通不為疏生而咨叩不為敬死不哭臨不為慢善觀走於師者於一奠焉而觀之無餘蘊矣尚享參政大資相國錢公序于前太傅和義郡王楊公施財鏤其板是皆牆塹宗門為法檀度傾滄溟之量溢般若之海俾見聞獲益迷悟超情一念含虗空三際悉平等所謂成佛作祖大居士誠哉是言乾道丙戌正月吉旦住山苾芻守詮謹識松源和尚普説應庵師祖初行腳時在一尊宿會下住多教學者過公案時師祖同一僧在佛殿裏過一則公案恁麼過也過不得又恁麼過也過不得二人商榷不覺雞唱遂拊掌散去後來一一過得了只是依前肚裏黑漫漫地遂冷地思量道若恁麼參禪如何敵得生死聞隨州水南遂和尚道行乃洞下尊宿法嗣恩官人徑往參禮便得歸堂有一連單兄弟長時坐禪不與人交師祖一日問他還少睡麼其僧厲聲道老兄而今是什麼時節更有工夫打睡師祖直得面熱汗下遂發志不捨晝夜以悟為則不過一月連單先有發明師祖亦有發明自此每每入室得路便撑將去遂和尚並不奈他何一日入室次喚華兄你也好只是公案未明師祖抗聲道盡大地是一箇公案和尚作麼生明遂和尚便低頭師祖道這老漢了我不得束包望方丈禮三拜便行聞得圓悟住雲居直造會下凡遇入室機機相副得數時圓悟提起向上巴鼻竟不能開口圓悟每向人説這箇蘄州子得即得只是腦後少一錐在圓悟歸蜀師祖也要隨他去圓悟道你不須隨我去有杲首座元侍者彰教隆藏主見處共老僧一般但去見他必為汝了却大事遂依教特去宣州彰教參隆和尚門庭孤峻直是不容湊泊未經數時遷虎丘亦參隨去續請充維那一日室中舉五祖牽牛過窗話擬祇對次被他劈胸一拳自此打斷命根是時隆和尚欲命首衆會中有圓悟耆舊云華維郍嫩在師祖聞得遂書偈於壁間云江上青山殊未老屋頭春色放教遲人言洞裏桃花嫩未必人間有此枝不辭便行此菴元和尚時住處州連雲師祖道我舊在雲居時每喫這漢無滋味如今看來未必他到我田地且去驗他看如何才到便上方丈侍者通報此菴聞得郎忙出來一見便云華兄此番且喜大事了畢師祖道我未曾開口他已知了信知得底人相見不在形言便知落處這箇便是參禪底榜樣豈似今時一般長老與學者相見一句來一句去末後多一句便為贏得禪究竟不知深淺蓋他不曾踏著正脈只在言句裏作活計云云應安庚戌佛生日天龍東堂比丘妙葩命二雕之應庵禪師振唱楊岐一宗提起虎丘正脈得他語於掌中欲弘通於遐代仍打施長財刊行流通伏願開拓人天祝延聖朝矣正應元年九月下旬八日三聖寺住持沙門湛照謹記奉行維那師元
