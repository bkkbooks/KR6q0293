body:
  text: 饒州莞山寶應禪院語録嗣法門人守詮等編上堂古釋迦不先新彌勒不後正當恁麼時盡乾坤大地人性命總在應庵手裏雖然如是大丈夫漢阿誰無一坐具地直饒千佛出世要侵他底不得何故蓋緣祖父契書四至分明既過至鑑難逃今日不免圓却此話乃竪起拂子云九萬里鵬才展翼一千年鶴便翱翔上堂明不見暗暗不見明明暗雙忘無異流俗阿師野犴鳴師子吼師子吼野犴鳴三家村裏臭猢猻價增十倍驪龍頷下明珠分文不直若作衲僧巴鼻甚處得來三十年後換手槌𦚾未是苦在病起上堂法身病色身即是法身色身病法身即是色身如是次第自幼至老病至膏肓神醫拱手處萬病脫然直下正體如如更轉向那邊然後法隨法行法幢隨處建立故能顯示攢簇不得底病直教千聖覔起處不得普入一切衆生身內全衆生之病入大解脫門證無生法忍始可津濟四生梯航九有若不如是空病何為敢問諸人只如山僧許多時病且道與適來所説之病是同是別若道是同未見老僧在若道是別亦未見老僧在何故海枯終見底人死不知心上堂盡大地不是自己你諸人二六時中向什麼處措足直饒滴水氷生要且事不相涉豈不見大梅悟心於馬祖言下臨濟契證於黃蘗棒頭雖然衲僧門下又且不然何也家無小使不成君子上堂舉子胡和尚門下立一牌牌上書云子胡有一隻狗上取人頭中取人心下取人足擬議則喪身失命僧問如何是子胡狗胡云嘷嘷臨濟下二僧來參方揭簾胡云看狗二僧回顧子胡便歸方丈師云二僧若親從臨濟來子胡要歸方丈未可者老漢雖慣得其便爭奈咬者僧不殺且道利害在什麼處上堂云十五日已前大底大小底小十五日已後小底小大底大正當十五日不大不小且道是佛耶是祖耶是凡耶是聖耶是人耶是非人那擬議不來劈脊𠞭更嫌何處不風流上堂舉僧問南泉如何是道泉云平常心是道又僧問趙州如何是道云墻外底又僧問白雲如何是道云始平郡如何是道中人云赤心為主師云且道這三句是同是別若道同語又參差若道別佛法不到今日還緇素得出麼若緇素得出莞山拄杖兩手分付若緇素不出它日它日撞著聱頭去在廬山歸宗禪寺語録嗣法門人守詮等編師入方丈據坐云凡為善知識居此室者須行五無間業然後示以鑊湯爐炭刀山釰樹碓搗磨磨謂之抽釘楔解黏去縛若是下劣種草必定望崖而退唯是法王真子始可親近正恁麼時如何喝一喝便起上堂僧問昔年王右軍捨宅為寺天下歸宗道場直得三世諸佛時時出現歷代祖師日日開堂正恁麼時截斷衆流一句作麼生道師云渠儂得自由進云捩轉大地人鼻孔忽遇知有底人來如何相見師云列在下風進云善財別後無消息樓閣門開竟日間師云須是與麼進云盡乾坤大地無纖毫過患猶是轉句不見一色始是半提須知更有全提時節如何是全提時節師云賺殺闍梨師乃云一句子銅頭鐵額一句子半合半開一句子和泥合水揭示拈花要旨洞明少室家風掀翻今古葛藤坐斷明暗途轍苟能直下承當頓見本來面目不必覺城東際始見文殊樓閣門開方參慈氏一見一切見一聞一切聞一明一切明一用一切用豈不見昔日有僧辭歸宗宗問向什麼處去僧云諸方學五味禪去宗云我這裏只有一味禪僧問如何是一味禪宗便打僧云莫打某甲會也宗云你作麼生會僧擬開口宗又打黃蘗聞云馬祖出八十四員善知識箇箇屙轆轆地唯有歸宗較些子圓悟師翁道若非黃蘗深辨端倪洎乎勞而無功師云二尊宿只解扶強不能扶弱若作一味禪入地獄如箭其或別有生涯何異鏤氷作玉且道節角在什麼處驀拈拄杖卓一卓喝一喝下座上堂僧問真淨和尚道頭陀石被莓苔裏擲筆峰遭薜荔纏羅漢院一年度三箇行者歸宗寺裏參退喫茶未審明什麼邊事師云他是關西子愛説川僧話復舉三聖問雪峰透綱金鱗以何為食峰云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峰云老僧住持事繁師云若謂二俱作家未具透關眼在且道歸宗恁麼説話還見二老落處麼諸人若辨得出歸宗性命在諸人手裏若辨不出諸人性命在歸宗手裏珍重檀越裝佛上堂云正眼洞明十虗無間直下坐斷情塵意想不落玄沙機關只向生佛已前識取本來面目不是心不是佛不是物恁麼中不恁麼剗草除根不恁麼中却恁麼同生同死正如壯士展臂不假他力又如師子王遊戲得大自在有時拈一莖草作丈六金身有時將丈六金身作一莖草亦能殺人亦能活人正恁麼時歸宗如何折合百寶裝嚴無相身一超直入如來地復舉昔毗藍園裏摩耶聖母左手攀枝釋迦老子右脅降誕九龍吐水沐金軀四顧周行各七步作大師子吼天上天下唯我獨尊後來雲門大師道我當時若見一棒打殺與狗子喫却貴圖天下太平師云達之居士打開無盡寶藏運出自己家珍裝嚴釋迦老子且道與雲門是同是別若道是同一人打殺一人成就若道是別佛法豈有兩般這裏得透去堪為如來種草苟或未然山僧有一頌舉似諸人跛腳雲門言打殺達之居士示全身當陽出格無多子報佛深恩只兩人化主請上堂法身無相而諸相顯然法眼無瑕而群機洞照所以一塵入正受諸塵三昧起德山入門便棒臨濟入門便喝至於歷代祖師撩鈎搭索路布葛藤無不精徹淵奧通證十虗塵塵爾剎剎爾念念爾時有西蜀比丘希慧從那伽大定安詳而起不離是定入諸塵勞門成就一切衆生行願海此心既辨克就今辰營備齋羞供養釋迦如來五百十六應真大阿羅漢且道釋迦老子還來也無若道來即今在什麼處若道不來又供養箇什麼諸人向這裏得透便與釋迦老子同一心知同一眼見同一受用其或未然歸宗更下箇注腳但願東風齊著力年年吹入我門來復舉丹霞問僧從什麼處來僧云山下來霞云喫飯也未僧云喫飯了霞云將飯與汝喫底人還具眼麼僧無語後來長慶問保福將飯與人喫報恩有分因什麼却不具眼福云施者受者二俱瞎漢慶云盡其機來還成瞎否福云汝道我瞎得麼師云丹霞既已龍頭蛇尾長慶保福只得將錯就錯雖然二三老宿要且不知這僧落處具擇法眼試請辨看上堂舉雲門道若説菩提涅槃真如解脫是燒楓香供養你若説佛説祖是燒黃熟香供養你若説超佛越祖之談是燒瓶香供養你皈依佛法僧下去師云三百六十骨節八萬四千毛竅被雲門一棒打開了也還有為衆竭力底麼出來為雲門作主與歸宗相見上堂舉僧問香林如何是衲衣下事林云臘月火燒山師云香林恁麼道老鼠入牛角忽有人問歸宗如何是衲衣下事只對他道來年更有新條在惱亂春風卒未休上元日上堂十五日已前提水放火十五日已後噪鴉鳴正當十五日風恬浪靜雨順風調民安國泰有一句子到你啞却我口無一句子到你瞎却你眼三文錢娶箇黑老婆頭不梳面不洗知他是凡是聖驀拍禪床一下云不入驚人浪難尋稱意魚上堂見聞覺知無障礙聲香味觸常三昧眼見如盲口説如啞蘇州人呆常州人打爺大宋國裏只有兩箇僧川僧浙僧其他盡是子淮南子江西子廣南子福建子豈不見道父慈子孝道在其中矣靈濟王生日上堂大方無外大道無門大用全彰大機普應洞明向上家風顯示今時樞要靈從何來包法界以無邊聖從何起置毫末而非隘直靈無功其功廣大真聖無體其體充滿譬如虗空具含衆象於諸境界無所分別又如虗空普通一切於諸國土平等隨入在天同天在地同地在人同人如是則小中現大大中現小於一毫端現寶王剎坐微塵裏轉大法輪耶舍開山不見半邊鼻孔拭眼革律打失一雙耳朵驀拈拄杖云二老今日向山僧拄杖頭上慶賀靈濟生辰各與二十拄杖何故當觀法王法法王法如是下座上堂飯籮邊漆桶裏相唾饒你潑水相罵饒你接觜黃河三千年一度清蟠桃五百年一次開花鶴勒那咬定牙關朱頂王呵呵大笑歸宗五十年前有一則公案今日舉似諸人且道是什麼公案王節級失却帖上堂釋迦老子道十方國土中唯有一乘法一動一靜一出一入是非窟裏閙布門頭劒樹刀山鑊湯爐炭且道是一乘法不是一乘法齪漢不要妄想山是山水是水僧是僧俗是俗其間有一箇半箇撩起便行腳跟下好與三十拄杖豈不見雲門道直得盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節大小雲門聽事不真喚鍾作甕上堂舉歸宗嘗與南泉同行一日告別煎茶次泉乃云從前與師兄商量語句彼此已知向後忽有人問極則事作麼生宗云這一片地好卓庵泉云卓庵且置畢竟事作麼生宗踢倒茶銚便起泉云師兄喫茶了某甲未喫茶宗云作這箇語話滴水也消不得泉休去五祖戒拈云南泉只解作主師云五祖只知其一不知其二殊不知南泉貪杯太急歸宗薄處先穿二老雖共發明馬祖正眼要且極則事未夢見在何故家住東州新鑄鍾上堂示衆有大智人具大知見啓大爐鞴奮大鉗鎚然後示大機顯大用於二百日中成此大法器住大解脫門亘千萬億劫震大圓音空明暗相以此津濟四生以此梯航九有以此祈祥懺罪以此息苦停酸以此揭示頂門正眼以此流通佛祖慧命直得星飛電捲山色凝光鳳舞鸞翔龍馳虎驟豈不見玄沙和尚道直似秋潭月影靜夜鍾聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事苟能於此洞明便見玄沙老子即今向紫霄峯下拭眼堂前騎聲蓋色坐斷十方脫或未然塞却耳根分明聽取元正日上堂僧問昔有僧問雲門如何是清淨法身雲門云花藥欄此意如何師云深沙努眼睛師乃云古今天地古今日月古今人倫古今山河釋迦彌勒坐籌帷幄耶舍拭眼罷戰沙場且道功成名遂一句作麼生道萬人遐仰處紅日到中天上堂舉唐朝因禪師微時嘗運槌擊塊次見一大塊戲槌猛擊之應碎豁然大悟後有老宿聞云盡山河大地被因禪師一擊百雜碎師云老宿恁麼道縱知因禪師落處𠾑鐵負鞍有日在這裏著得眼去也是徐六擔板上堂舉龐居士一日問高峰云此去華頂有幾里峰云什麼處去來士云可謂峻硬不得問著峰云是多少士云一二三峰云四五六士云何不道七峰云才道七便有八士云得也得也峰云一任添取士云不得堂堂道峰云還我恁麼時龐老主人公來士云少神作麼峰云好箇問訊問不著人士云將為將為師拈云發大機顯大用且非電光石火疾焰過鋒要須平地上嶮崖孤峻處平坦看他二老深入虎穴透徹淵源至於結角羅絞遊刃磅礴得大自在因甚麼頂峰未曾到只如高峰云還我恁麼時龐老主人公來士云少神作麼歸宗向這裏擬著箇眼也要諸人瞥地良久云竹影掃階塵不動月穿潭底水無痕上堂舉龐居士訪長髭值上堂大衆集定士便出云各請自撿好長髭便示衆士却於禪床右立時有僧問不觸主人公請師答話髭云識龐公麼僧云不識士便搊住其僧云苦哉苦哉僧無語士托開髭少間却問士云適來這僧還喫棒否士云待伊甘始得髭云居士只見錐頭利不見鑿頭方士云恁麼説話某甲即得外人聞之要且不好髭云不好箇什麼士云阿師只見鑿頭方不見錐頭利師拈云風行草偃水到渠成覿面提持斬釘截鐵龐居士打開無盡寶藏運出自己家珍要且只解自家富貴安能富貴別人長髭久經陳敵慣戰作家至嶮至危處愈見八面玲瓏歸宗大衆集定其間設有一箇半箇善能自檢便與趕出何故家無白澤之圖豈有如是妖怪退請再歸上堂釋迦老子道不著底句歸宗今日道著達磨祖師拈不出底機歸宗今日拈出從上佛祖百孔千瘡一切與汝諸人塞却便好各各安家樂業照管祖父田園自然時清道泰雨順風調吹無孔笛唱太平歌不妨快活平生雖然以世諦推之則有利有害若以佛法商量則無固無必所以道動若行雲止猶谷神既無心於彼此豈有象於去來去來不以象動靜不以心如是則法隨法行法幢隨處建立不免高挂鉢囊拗折拄杖且坐斷金輪峰一句作麼生道如斯標志雖清拙大丈夫兒合自由復舉南禪師出城還山有頌示衆去時一溪流水送回來滿谷白雲迎一身去住非去住二物無情似有情師云南禪師好則好祇是愛便宜山僧也有一頌舉似大衆去時冒雨連宵去回來帶水又拖泥自怪一生無定力尋常多被業風吹塑佛開光明示衆云達之居士以無礙智力洞明吾佛相好以無礙辨才成就一切奇特殊勝不可思議解脫門設使虗空為口江海為舌盡塵沙劫讚歎而莫得其倣佛矣且道釋迦老子是有光明可開是無光明可開若道有光明可開歸宗當墮五無間獄若道無光明可開盡乾坤大地無一人發菩提心到箇裏苟非契證從上諸佛妙心又焉能觀瞻如來勝妙頂相正當恁麼時如何當陽拈出真消息豈教辜負釋迦文上堂披毛戴角拽把牽犁耕荊棘林下地獄種開三毒華結無明果是故見者聞者悉起惡念惡念起時充塞虗空即虗空體證魔王身正當恁麼時誰是施者誰是受者箇裏緇素得出許你諸人有出身路苟或未然且道佛之與魔是一是二一二之義汝等諸人且莫瞌睡為甚如此三十三天躍氣毬上堂僧問擘開華嶽巨靈謾騁其威百步穿楊由基未為中的祖師門下如何理論師云透頂透底進云未審向上還有事也無師云向上問將來進云相逢不拈出舉意便知有師云未是向上事在進云記得僧問濛溪和尚云不落凡聖機請師別道溪鳴指三下此意如何師云傷鋒犯手進云巖巒峭峻如何趍途溪良久又作麼生師云莫向良久處會進云祇如濛溪恁麼答話還有為人處也無師云有進云如何是濛溪為人處師云敗也敗也進云祇如這僧道濛溪今日瓦解氷消未審過在甚處師云看闍梨失却鼻孔進云溪擲下拂子僧拈起溪便喝僧呵呵大笑云事不孤起此意如何師云一點水墨兩處成龍進云恁僧會了恁麼道師云正好檢點進云祇如濛溪道暗中拼繩誰辨曲直僧云拘劒傷身是誰之咎又作麼生師云二俱瞎漢進云未審者兩轉語那一轉親師云總不親進云恁麼則歸宗今日出古人一頭地也師云莫要埋沒老僧進云僧拂袖便行溪云難遇此子意作麼生師云笑破乞兒口進云祇如濛溪恁麼道為復成人之美為復陷虎之機師云坐斷咽喉進云不貪香餌味可謂碧潭龍師云一釣便上僧禮拜師云心自本來心本心非有法有法有本心非心非本法是汝諸人八萬四千毛竅三百六十骨節祖師一時打開了也歸宗更為破慳卓拄杖一下下座上堂舉龐居士訪洛浦士拜起云仲夏毒熱孟冬薄寒浦云莫錯士云龐公年老浦云何不寒時道寒熱時道熱士云患聾作麼浦云放你三十棒士云啞却我口瞎却你眼師云龐居士雖是煅了底金要且未經本分鉗鎚洛浦雖輕放過歸宗不免賊過後張弓當時待他道仲夏毒熱孟冬薄寒便與趕出何故車不橫推理無曲斷端午上堂五月五日端午節好事當陽難掩塞歸宗突出拄杖頭間神野鬼俱消滅俱消滅砌下寒泉忽倒流嶺上白雲不敢白復舉文殊一日令善財採藥云是藥者採將來善財遍採無不是藥却來白云無不是藥者文殊云是藥者採將來善財拈一莖草與文殊文殊提起示衆云此藥亦能殺人亦能活人師云大小文殊被善財換却眼睛下座上堂僧問林泉日永殿閣涼生時節因緣即且置百丈捲席事如何師云毗婆尸佛早留心直至如今不得妙進云祇如馬祖歸方丈作麼生師云不是苦心人不知進云首山道龍袖拂開全體現又作麼生師云刺頭入膠盆進云汾陽道師意如何首山云象王行處絶狐蹤豈不是明百丈捲席意師云兩箇無孔鐵鎚進云汾陽於言下悟去還端的也無師云聽事不真喚鍾作甕進云汾陽如此悟去也合喫歸宗手中棒師云過在什麼處進云貪觀山色好忘却祖師禪師云闍梨棒教誰喫僧禮拜云謝師答話師乃舉風穴示衆云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安貼於此明得闍梨無分全是老僧於此不明老僧即是闍梨闍梨與老僧亦能迷却天下人亦能悟却天下人欲識闍梨麼右邊一拍云這裏是欲識老僧麼左邊一拍云這裏是師拈云大小大風穴不會轉身句上堂云從上佛祖道不得底拈不出底歸宗今日盡情與你諸人拈出有般漆桶見拄杖便喚作拄杖有般漆桶見拄杖不喚作拄杖似這般底向歸宗門下總是擔枷帶鎖漢五十年前一百年後拳躍相副箭鋒相拄且道為什麼人發機毗婆尸佛早留心直至如今不得妙上堂云參學人切忌錯用心悟明見性是錯用心成佛作祖是錯用心看教講教是錯用心行住坐臥語言三昧是錯用心喫粥喫飯屙屎送尿是錯用心一動一靜一往一來是錯用心更有一處錯用心歸宗不敢與諸人説破何故一字入公門九牛拽不出
