front:
  text: 應庵和尚語録序道不可以言傳不可以情解不可以識識夫如是則應庵語録將何用哉自昔古尊宿未嘗有無言者如以黃葉止小兒啼坐斷中邊超脫三際謂之參活句非學語之流所能解也後世師法之是之謂不朽此應庵所以不得默默而但已師頃挂錫天台護國為元布袋所稱賞請為第一座軒然如野鶴之出雞林自是諸方聲名籍甚紹興丙子余去郡三衢乃遇諸途少留于白鶴寺夜話終夕而論辨從橫如大川東注袞袞莫知窮極如駕輕車就熟路周遊四方而無留礙也以是期此公必能振起楊岐一宗後果遍住名山所至雲衲歸重最後天童法席尤盛肩相摩袂相屬隨其根器聞其法者咸有所得顯忠詮又其嶄嶄出頭角者既住鳳山即編類師生平所説為一帙以傳後學厥志可為勤矣所謂從苗辨地因語識人則不可無此録然以正眼觀之借使如珠走盤空花亂墜猶未是見應庵道理斯事實難商攉有志之士宜著精彩則師之話行也必矣松居士錢端禮序應菴和尚語録目録序文嚴康朝撰目録卷第一住處州妙嚴禪院語録衢州桐山明果禪院語録蘄州德章安國禪院語録卷第二饒州報恩光孝禪寺語録饒州東湖薦福禪院語録卷第三饒州莞山寶應禪院語録廬山歸宗禪寺語録卷第四婺州寶林禪寺語録婺州報恩光孝禪寺語録再住歸宗禪寺語録江州東林太平興龍禪寺語録卷第五建康府蔣山太平興國禪寺語録平江府報恩光孝禪寺語録卷第六明州天童山景德禪寺語録小參卷第七法語上卷第八法語中卷第九法語下書卷第十頌古真贊偈頌佛事塔銘祭文附
