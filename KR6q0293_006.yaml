body:
  text: 明州天童山景德禪寺語録嗣法門人守詮等編入寺上堂云風行草偃水到渠成正令既行十方坐斷若也向上論去語默不及處棒喝未施前總是依草附木漢事不獲已且作死馬醫所以道隨處作主遇緣即宗法幢隨處建立展臨濟三玄戈甲會曹洞五位君臣敲倡雙行殺活自在拈一莖草穿天下衲僧鼻孔布縵天網要打衝浪錦鱗是則是便與麼去達磨一宗掃土而盡驀拈拄杖劃一劃云劍為不平離寶匣藥因救病出金瓶以拄杖卓一卓謝詞不録復舉僧問當山第一代啓禪師云學人卓卓上來請師的的啓云我這裏一屙便了有甚麼卓卓的的僧云和尚恁麼答話更買草鞋行腳始得啓喚僧近前僧乃近前啓云老僧恁麼道過在什麼處其僧擬議啓便打師云啓禪師故是本分鉗鎚塞新天童口未得在這僧雖深入閫奧要且未具透關眼下座上堂舉僧問趙州如何是毗盧圓相州云自小出家不曾眼華師云趙州見處偏枯若有人問天童如何是毗盧圓相祇對他道大底大小底小且道與趙州還有優劣也無具擇法眼試檢點看上堂舉昔日崔郎中問趙州和尚云大善知識還入地獄也無州云老僧末上便入崔云既是大善知識為甚却入地獄州云老僧若不入爭救得郎中師云善知識者是大因緣臨垂手時著著有出身之路何故如此不入虎穴爭得虎子上堂云禪禪更不相煎坐底自坐眠底自眠大家安樂無法可傳禪禪曹洞五位臨濟三玄大年三十夜腳踏地頭頂天禪禪不直半文錢海枯終見底人死腳皮穿施主請上堂當機不昧千眼頓開智鑑洞明十虗普應直得如天普蓋似地普擎如日普照如風普吹無一絲毫許為緣為對為死為生為去為來所以道一切法不生一切法不滅若能如是解諸佛常現前又道未達境唯心起種種分別達境唯心已分別即不生於分別不生法中識取不變動清淨本然周遍法界本來面目若了得去天地未分生佛未立已前乃至劫火洞然大千俱壞於中無一絲毫動搖無一絲毫起滅無一絲毫增減無一絲毫榮辱若能恁麼便知得亡者曠大劫來至于今日生死去來了不可得且道超然萃一句作麼生道九蓮開合處百寶自莊嚴官客入山上堂云釋迦老子道吾有正法眼藏涅槃妙心分付摩訶大迦葉恁麼說話大似傍若無人豈不見陳操尚書一日訪資福福見來以手𦘕一圓相尚書云弟子恁麼來早是不著便那堪更𦘕圓相資福便歸方丈閉却門後來雪竇道尚書祇具一隻眼真如哲和尚云資福雖是本分鉗鎚爭奈尚書是煅了底精金師云雖然如是若到天童門下未放過在當時待尚書道弟子恁麼來早是不著便那堪更𦘕圓相天童則大開東閣明窗下如法安排何故門內有君子門外君子至上堂良工未出玉石不分巧冶無人金沙混雜縱使無師自悟向天童門下何啻朝打三千暮打八百驀拈拄杖云喚作拄杖玉石不分不喚作拄杖金沙混雜其間一箇半箇善別端由管取平步青雲苟或未然以拄杖卓一卓云急著眼看上堂舉慈明示衆云一切賢聖皆以無為法而有差別前是案山後是主山且道無為法在什麼處良久云向下文長付在來日師云天童也著一隻眼一切賢聖皆以無為法而有差別東弗于逮西瞿耶尼南贍部洲北單越到處去來不如在此劉氏請上堂云四月初八佛生日天下叢林皆浴佛佛身充滿太虗空何處更有虗空覔見前僧俗等金軀長短方圓皆顯赫放光動地二六時從本至今無間隔今有檀越女弟子劉氏同男王承直曠大劫來植善根所行真實如菩薩當知功德福無涯回向癸未誕生日唯願歲君嚮此誠諸天星曜同昭格資持劉氏從此去壽同趙州百二十更祈不盡大功勳保男察判官崇極子子孫孫福祿昌無量福田咸併集此月十四往臨安龍天當護為般挈三江九堰聰明神稽首歸依助英傑全家既達九重城母子欣歡仰天力舉傑首座立僧上堂云一棒一條痕一摑一手血臨濟老瞎驢至今猶未瞥須彌頂上浪拍天大洋海水無一滴偉哉本色人頂門亞三隻辨龍蛇百草頭擒虎兕一毫力穿大地人鼻孔坐斷衲僧搖舌雖然猶未撥動向上一竅在且作麼是向上一竅問取堂中首座傑上堂五月五日端午節天童為汝開真訣驅釋迦逐彌勒佛病祖病毛病頓清涼魍魎邪神俱殄滅相從唯喜本色人非我同流誰與別拄杖子非列挈公心一字更無說千古萬古休饒舌上堂舉懷禪師云青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中南山起雲北山下雨會麼甜瓜徹蒂甜苦瓠連根苦師云天童也下一著青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中狗子尾巴書梵字野狐窟宅梵王宮應庵和尚小參住湖州顯忠資福禪寺門人守詮等編廣德軍趙中大施法衣請小參僧問判府中大所施法衣彌勒千尺之軀披來不短釋迦丈六金身搭來不長和尚用之恰恰相稱未審此意如何師云逼塞虗空進云恁麼則蓋覆大千去也師云天上天下進云直得竪窮三際橫亘十方師云一句道著進云者一句甚處得來師云者一句也無來處進云只如韓文公問大顛和尚弟子公務事繁佛法省要處乞師一言大顛默然意旨如何師云斬釘截鐵進云只如侍者敲禪床三下大顛云作什麼者云先以定動後以智拔文公忽然大悟又作麼生師云入地獄如箭進云和尚門風高峻弟子向侍者邊得箇入處還契大顛也無師云家醜莫外揚進云青山不鎖長飛勢滄海合知來處高師云無錢沽酒僧禮拜師云何不進語師乃舉教中道若以色見我以音聲求我是人行邪道不能見如來乃喝一喝云諸人還聞麼要且不是聲提起袈裟角云諸人還見麼要且不是色既不向聲色上辨向什麼處見如來若道二六時中一動一靜一語一默折旋俯仰處見如來即是認賊為子若道不向二六時中動靜語默折旋俯仰處辨正是癡狂外邊走到者裏若是明眼漢瞞它一點不得豈不見本仁和尚道尋常不欲向聲前句後鼓弄人家男女要且聲不是聲色不是色時有僧出問如何是聲不是聲仁云喚作色得麼曰如何是色不是色仁云喚作聲得麼且道為你說答你話若辨得出於佛法中不妨有箇入處雪竇拈云本仁也甚奇怪要且貪觀天上既非聲前句後從什麼處入師拈云雪竇到者裏盡其神通無插手處只如道既非聲前句後從什麼處入往往十箇有五雙蹉過還知薦福落處麼一箭落雙鵰了智上人遠自廣德持判府中大回施俸資特就今辰齊僧營辦種種佛事及捨法衣一頂與山僧受用乃命小參舉揚正法眼藏涅槃妙心集此無涯上善並用祝陪台算并諸寶眷福壽延鴻不盡功德四恩總報三有齊資法界有情同圓種智判府中大雖未參識竊聞深知有此一段大事雖相去千有餘里而未嘗隔一絲毫許正所謂千里同風也既作宗門外護而又於此道不倦信知於過去無量塵沙劫中熏習得熟才出頭來一撥便轉豈在忉忉也然做工夫別無他術只要有大信根具大種智知有此事於二六時中行住坐臥處切切提撕看是什麼道理但恁麼推來推去推到無依倚處驀地撞著更不費絲毫氣力便是從娘肚裏出來底未嘗別有一物與你也與它從上佛祖同一受用正如斬一綟絲一斬一切斬如染一綟絲一染一切染前後際斷三祇劫空覔其虗空了不可得全體是箇金剛正體了無出沒在諸佛分上不曾添一絲毫在凡夫身中不曾減一絲毫如水洗水似金博金有時拈一莖草作丈六金身有時將丈六金身作一莖草擒縱自在殺活自由者箇話頭乃從靈山會上黃面老子處來佛佛祖祖以心契心至於今日未嘗有一絲毫許錯誤謂之正法眼藏涅槃妙心未有天地未有日月未有人倫已前此心亦逼塞虗空逮乎天地既分有日月人倫此心亦逼塞虗空所以道生也恁麼死也恁麼要且生死籠它不得何故為它著著有出身之路不見教中道若在長者長者中尊為說勝法若在居士居士中尊斷其貪著若在剎利剎利中尊教以忍辱若在婆羅門婆羅門中尊除其我慢若在大臣大臣中尊教以正法若在王子王子中尊示以忠孝若在內宮內宮中尊化正宮女若在庶民庶民中尊令興福力若在梵天梵天中尊誨以勝慧若在帝釋帝釋中尊示現無常若在護世護世中尊護諸衆生此蓋從清淨微妙根本智中廣發如是勝妙方便大解脫門又謂之金剛正體又謂之頂王三昧又謂之浮幢王剎海又謂之第一義至於楊岐和尚以金剛圈栗棘蓬揭示學者洞明少室直指之由其變通逸格超量得大自在與一切人抽釘拔楔解粘去縛令各各自證透頂透底要且不可以心知不可以識識長沙和尚道我若舉揚宗教法堂前草深一丈事不獲已所以向諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向諸人道三世諸佛共盡法界衆生是摩訶般若光光未發時汝等諸人向什麼處委光未發時尚無佛無衆生消息既無佛無衆生消息且道大地山河日月星辰人畜草芥纖洪長短從什麼處得來還知落處麼天上有星皆拱北人間無水不朝東檀越散藏經請小參云釋迦老子道始從鹿野苑終至跋提河於是二中間未嘗說一字祇如一大藏教從甚處得來這裏若覷得徹去便知釋迦老子落處既知落處便具看經眼目豈不見昔有一婆子請趙州看經州繞禪床一匝婆云此來請和尚看全藏如何祇轉半藏如此看經忒煞省力更不用鎚鍾擊磬歌贊佛乘五千餘軸不在彈指頃一切了畢須是恁麼看經始得若肚裏著箇元字腳便被黑豆子換却眼睛了也更隨人舌頭轉一藏半藏有甚了期大丈夫漢直須一刀兩段方知一句一偈一文一義無不從自己𮌎中流出蓋天蓋地至於折旋俯仰動作施為皆是如來清淨妙輪轉轆轆地所以道從無住本立一切法昔有僧見老宿看經次乃問如何是看經眼老宿竪起拳頭看他用處不妨嶮峻且如何領會若喚作看經眼又是拳頭若喚作拳頭又失却看經眼到這裏不假三寸舌辨明得出方信道終日著衣未嘗挂一縷絲終日喫飯未嘗咬破一粒米終日看經不曾道著箇元字腳如是則不唯看經眼目分明至於所獲利益不可思議其或未然報恩更為諸人下箇切腳毗盧遮那清淨海充滿三千與大千虞七員外請小參僧問道高龍虎伏德重鬼神欽常年無此事今夏有知音正恁麼時如何師云知音知後更誰知僧云這知音還是王老師向上事也無師云喚作向上事也得僧云恁麼則向上向下總由和尚去也師云老僧從來不曾脫空僧云祇如大盡三十日小盡二十九豈不是脫空師云汝還脫得也未僧云從朝至暮不曾動著舌頭師云未見脫空在又僧問國清炙茄光孝煎茄是同是別師云飽便休僧云至道無難唯嫌揀擇師云自領出去師乃云是真精進是名真法供養如來爾時靈山一會儼然未散豈不是今日恁麼時節雖然不言我家醋淡蓋為天人各有一坐具地侵他一絲毫也不得光孝恁麼提唱須是箇人始得還有獨脫底麼出來與光孝相見其或未然是法住法位世間相常住復云老僧自到光孝首荷七員外令閣喜道人令嗣祖道昆仲舉家學般若眷屬無不勠力外護自非夙昔有大因緣安能若是耶然而與人相聚莫非身心真實心若真實至於動轉施為行住坐臥一語一默無不真實豈不見古人道祇箇心心心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實所以山河大地日月星辰人畜草芥皆依真實而現相好然真實之義即是從上佛祖清淨大解脫門祇看當人各各所行如何其間一生為善者至於多生為善者無量劫來為善者其殊勝果報歷歷現前苟為不善者其不善境界亦常歷歷現前信之善惡報應毫髮無差且如衲僧家親近善知識悠久辦一片真實身心窮己躬大事無有不成辦底道理是故從上佛祖天下老和尚無不以真實顯示豈不見疏山矮師叔在溈山會下聞示衆云行腳高士直須向聲色裏睡眠聲色裏坐臥始得是時踈山出問云如何是不落聲色句溈山竪起拂子踈山云此是落聲色句溈山便歸方丈踈山不契遂辭香嚴嚴云何不且住踈云某甲與和尚無緣嚴云有何因緣不契試舉看踈山遂舉前話嚴云某甲有箇語踈云道什麼嚴云言發非聲色前不物踈云元來此中有人乃囑香嚴云師兄向後有住處某甲却來相見諸人要識言發非聲色前不物麼便是釋迦老子道一人發真歸源十方虗空悉皆消殞底螢火之光也然踈山癢處既被香嚴抓著豈止溈山檢點千古之下具大眼目尊宿皆不放過溈山至晚乃問香嚴問聲色話底矮闍梨在麼嚴云已去也溈山云向子道什麼嚴云某甲亦曾對他來溈云試舉看嚴云言發非聲色前不物溈云他道什麼嚴云他深肯之溈山失笑云我將謂這矮子有長處元來祇在這裏看溈山下這一著不妨驚天動地惜乎土曠人稀溈山又云此子向去設有住處近山無柴燒近水無水喫爛泥裏有刺然古人之言必不妄矣在今天下討一箇言發非聲色前不物底正如掘地覔天何況要會溈山說話不言可知矣雖然切忌鑽龜打瓦大底宗師據曲彔床不是細事山野自出世來隨所住處非不為兄弟激揚此事然未嘗動著箇一著子頃住薦福偶然二三百衲子相聚因而略露鋒鋩遂惹起無限風波自後一向隨宜施設終不將真珠作豌豆糶却也古人有見賢思齊之說在今日去聖時遙邪師過謬非衆生咎是他本色道流做工夫底祇向腳跟下推究推來推去驀然推徹豈不是大力量人苟推未徹語意活脫終不為間言市語魍魎魑魅語邪師印證語有箇見處語知是般事語硬配在生滅斷常坑子裏所謂善知識者是大因緣老僧行腳走遍江西湖南及乎到圓悟師翁爐鞴中更開口不得正如就地彈相似是他為人不妄下手至下手時峻峭無道理與人湊泊後到先師處稍知觸淨方見圓悟師翁說話分曉蓋尊宿為人古今難得其人是他本分手段逈別比其和泥合水阿師豈可同日而語耶昔高安白水仁禪師示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧禮拜仁云且道為你說答你話若向這裏見得溈山道這矮子將謂別有長處元來祇在這裏箇些子明白便見得白水仁禪師道且道為你說答你話無不透頂透底刢利漢聞恁麼舉豈止醍醐灌頂苟或未然參須實參悟須實悟閻羅大王不怕多語久立檀越張子明裝佛慶懺請小參示衆云如來密語初不覆藏覿體無私當陽顯示祇如一大藏教從甚處得來非頂門具眼肘後有符又安能洞明這一著子祇今坐立儼然各各頂天立地含齒戴髮且作麼生說箇初不覆藏底道理莫是一動一靜告往知來是麼莫是折旋俯仰周遍一切處是麼莫是一語一默坐臥談笑是麼若把這箇作不覆藏底無異吹毛覔縫撥火求漚殊不知正是業識忙忙無本可據豈不見長沙和尚道學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人是他古人見得如來密語徹底無疑等間拈一機示一境無不透頂透底終不向夢幻殼子裏顛倒肉團心識上揑怪也又有僧問古德學人有一問在和尚處時如何古德云設有也斬為三段看他得底人躍出來不妨烜赫何嘗有一𮈔頭許與學者作道理直是乾嚗嚗地如一座須彌山相似世間一切逆順境界搖撼不動善惡因緣籠無門豈不是大丈夫格外道人也敢問諸人祇如釋迦老子未入母胎時三十二相八十種好又向什麼處塑裝這裏見得徹去便見得大心檀越張子明同妻趙氏裝嚴釋迦老子最初一念起處祇如子明未起裝嚴最初一念釋迦老子又在甚處切忌向夢幻殼子裏顛倒肉團心識上揑怪到這裏莫問釋迦老子如之若何但直下了却最初一念此念若了未入母胎底也不是入母胎後也不是從母胎出底也不是塑底也不是裝底也不是最初一念也不是了却最初一念也不是然後張子明與妻趙氏男宗朝舉家眷等却有與釋迦老子相見分既是從頭俱不是了又向什麼處相見還委悉麼將此身心奉塵剎是則名為報佛恩喝一喝下座小參罷復舉茗溪示衆云吾有大病非世所醫看他古人吐露箇消息不妨烜赫其實無它祇是踏著向上關捩子拈出來便該天括地近傍不得是他往日有知音後來僧持問曹山未審是什麼病山知他落處便道攢簇不得底病這箇便是知音也豈似而今無地頭恣意亂道才見人問未審是什麼病便打入葛藤窠裏恰如拽鋸相似你拖去我又拽來幾時得歇於本參中有甚麼交涉這般病諸人皆有之祇是不會病灼然攢簇不得既不會病變成毛病去既成毛病祇是業識忙忙無本可據到年窮歲盡總無得力處豈不哀哉若踏著攢簇不得底病便有超生離死之由這僧又問一切衆生還有此病也無山云有僧云既有因什麼不病山云衆生若病即非衆生者僧也會推勘又問曹山和尚還有此病也無山云老僧正覔起處不得不妨嶮峻這一句子難道非曹山如何啓口雖然正覔起處不得諸方具正知正見者其護惜珍育為出世妙訣不肯容易發露與人若向薦福門下正是大病謂之貼肉汗衫謂之解脫深坑又謂之死水又謂之墨汁又謂之明白你諸人若病到覔起處不得但來問薦福當為顯示諸方奈你何不得何故蓋正坐此病這僧又問一切諸佛還有此病也無山云有僧云為什麼不病山云為伊惺惺此老人是曹洞正傳有回互傍參不犯底手段臨機八面得大自在豈守窠臼瞎學者眼諸道流既來此間相聚二六時中急著精彩時不待人儒者尚云朝聞道夕死可矣況衲子乎傳法寺智都僧正請鳴鍾師示衆云頑銅鈍鐵美玉精金大冶紅爐一模鑄就不假毗沙門天王神力豈從須彌頂𩕳上持來器重千鈞樓高百尺啓圓通三昧發清淨妙音直須眼處承當莫向耳邊領略鑊湯爐炭不用吹而自滅刀山劒樹何待喝而後摧昏夢頓除沉迷了悟萬象森羅俱作舞大千沙界一時聞大衆且道末上一槌落在什麼處劫石有消日洪音無盡時
