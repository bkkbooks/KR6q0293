body:
  text: 嗣法門人守詮等編法語上示徽禪人達磨西來直指人心見性成佛不妨直截省要正眼看來已是七錯八錯了也事不獲已且作死馬醫祇者直指底心便是黃面老子四十九年橫說竪說不著處至精至妙罕有達此正脉者此心傳授不得唯自證自悟到無迷悟處祇是平常著衣喫飯更無許多玄解義路貫塞胷次蕩蕩地閑閑地祖師道一種平懷泯然自盡方得大受用至於臨生死之際湛然凝寂更無毫髮走作祇恁麼地如一坐須彌山相似豈不要哉近年來參學兄弟雖號行脚恰如冷水澆石一般到所在挂搭祇是妄想記憶諍勝負以當平生真可憐憫若是正因行脚人終不恁麼地看佗從上古聖挾複子出叢林入保社親近真正善知識十年二十年退步就己寒灰枯木密密地究竟根蒂下一些子要著實處方可隨緣任運名為了事衲僧行脚高人若心地不洞明如何歇得十二時中起心動念匝匝地如千波萬浪相似如何消融得去到這裏若無透脫處祇是一箇無所知盜常住飯劫賊臨濟和尚謂之禿兵是也劫來劫去劫得渾身赤骨聿地忽然緣謝所有平生機智聰慧向眼光落時一點也用不著設使累生作得恒沙功業愈無超生死之期祇得人天福報報盡依舊無出頭處若要窮虗空劫盡未來際受用不盡須是直下心空既未能徹證此道當須稟大宿誓擇本分宗師放下複子盡此一報身窮究此公案無有不契證者第恐如存若亡口頭雖說參禪肚裏全不肯做若此不如歸一頭存誠看教作白淨業將來不失人身古德云說得一丈不如行得一寸是也且如今列剎相望呼為善知識傳直指底心宗畢竟此心如何傳是何形狀近來出一等魔教中謂之惡友各說異解以為利人或者指示教人休去歇去都莫思量纔起動念速為除去或者教人一向無事香不燒拜不禮或者一向令人理會古今去恰如箇杜撰座主或者將從上老宿赤心提持處謂之建立門庭或者見學家來室中下得一轉語相似打半日又問一句學者又進語合得佗著便謂此兄弟有箇入頭處且道此幾等利人還契得直指心麼灼然是無星子交涉所以佛鑒和尚道今之善知識多是曲指人心說性成佛此之是也臨濟正脉自百丈於馬師喝下代至今非但契證諸大祖師命根亦乃徹證不可說不可說百千萬億阿僧祇佛祖命脉絲髮不差百丈得黃蘗黃蘗得臨濟臨濟付三聖乃云誰知吾正法眼藏向這瞎驢邊滅却祇這箇說話若見得徹去何更有臨濟宗耶德徽上人以道義相從頗追古風不倦窮究衲衣下事誠謂之不虗行脚也若要易會祇向十二時中起心動念處但即此動念直下頓豁了不可得如大虗空亦無虗空形段表裏一如智境雙泯玄解俱亡三際平等到此田地謂之絕學無為閑道人也更須知有五祖道底始得上人既炷香誠懇因書以付其行紹興十一年八月望日示希禪人古來老知識發心行脚時為生死二字不破動餘萬里尋真善知識決擇此事十年二十年廢却世間一切閑雜骨董念茲在茲未甞片時不在裏許尚恐走作不得此事成辨長慶和尚在雪峯玄沙往來二十年坐破蒲團六七箇豈不是大根器尚不能徹證盖古人參學不肯小小了却直是今生參不得便休終不敢取次承當嗟呼深不容易也一日見卷簾豁然漆桶破命根嚗地斷便說箇頌子也大差也大差卷起簾來見天下有人問我解何宗拈起拂子劈口打此便是達磨直指底心更無秋毫許領覽悟解方可為佛種草也每見今時兄弟做工夫不在沉掉處便在惺惺處坐地中其沉掉則猶若醉酒之人行於長途也飲其惺惺則聞見逸於心腑以為究竟法也但捨二岐而致之一處常爾提撕豁然徹去不是分外事近日叢林有一等參學者不自去真實履踐己躬堅愛宗師說禪病禪又何甞有病來祇為胡亂領覽強記為諦實於本參學中實無得力處所以宗師家用一些子本分草料謂之解黏去縛令學者知非而反食宗師說病之語益於胷次以為究竟法深可憐憫也如今若要此事易辦但念念無雜純一真實久久自然徹法源底也示國清初化主古來道流痛念死生未明立大志如金石放複著處所求真正善知識決擇父母未生前一段大事豈肯容易哉動經二三十年灰却攀緣滅却意想孜孜冷地裏一朝豁然漆桶墮喪却眼前光影應是從前祭鬼家具依草附木神祇一切氷消瓦解全是自己本地風光如倚天長劒誰敢正眼覰著覰著即瞎却所以臨濟入門便喝德山入門便棒魯祖見僧面壁俱胝見僧豎指至於從上若佛若祖天下有眼底老和尚全以本分草料覿面提持如斷命刀子相似若是識痛痒漢便知落處其如皮下無血眼裏無珠底且留待彌勒下生為佗說破示湛禪人明果門下無禪可說無道可傳祇有一口劒不問佛來祖來聖來凡來拈起便斬若解向劒刃下翻得身底一任出一叢林入一保社把禪床上老漢與一拶若見口裏水漉漉地腰包便行豈不快哉若也未能徹證扶荷也不得草草深宜子細神鼎諲和尚道參須實參悟須實悟閻羅大王不怕多語也不負平生行脚初志盡此報身靠却本色人一二十年間忽然遭佗毒手頂門裂眼睛落光影盡伎倆除活鱍鱍地吒吒呀呀如師子王去住自由哮吼自在豈不是大丈夫意氣做大丈夫事業方謂之出群英特之士也白雲端和尚道悟了須遇人始得若不遇人祇是一箇無尾巴猢猻纔弄出人便笑深信此道者萬中無一誠可憐憫示清禪人洎出隊兄弟黃面老子未出母胎時便用一條斷貫索穿天下人鼻孔及乎出頭也用者索子四十九年口吧吧地也祇用者索子又道四十九年未甞道著一字也只用者索子末後拈花迦葉微笑以正法眼藏分付摩訶大迦葉也祇用者索子列派已來迄至于今烹佛煉祖也祗用者索子近日者索子看看無人解拈動設有解拈動恰如深夜伸手捉物雖執其物知它是青黃赤白長短大小初不分曉何故盖為來處不諦當遂致瞞瞞頇頇若來處諦當便見三世諸佛說夢六代祖師說夢天下老和尚說夢夢見黃面老失却斷貫索子既失却了且道汝諸人將什麼受用者些子如縵天鐵網相似透得過者八面通途透不過者且向諸上人手中乞命示崇侍者開元和尚語錄祖師西來直指人心見性成佛向衲僧門下恰似掘地活埋人也事不獲已且作死馬醫說箇佛說箇祖說箇心說箇性如將蜜果換苦葫蘆之說也若是大丈夫漢一刀兩段退步就己向一念未生已前豁然透本來面目洞明十虗廓徹無間便與釋迦老子不別謂之頂王三昧謂之烈焰聚謂之金剛王寶劒謂之踞地師子謂之塗毒鼓謂之種種名當恁麼時誰為生死誰為去來誰為善惡誰為逆順誰為是非誰為天堂地獄誰為四生六道盡大地是箇解脫門全體是箇無位真人受用物豈不見臨濟和尚道赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看時有僧出臨濟下禪床欄胷擒住云速道速道僧擬議濟托開云無位真人是什麼乾屎橛此便是達磨源流也臨濟得此三昧如大雲雨如百千萬雷變通逸格其唱愈高三聖得此三昧其和愈峻至於興化南院首山風穴汾陽慈明楊岐白雲東山圜悟皆得臨濟正裔見徹本心妙其三昧誠謂教外別傳直指之要不辜也此庵老人始發大志游方首造蔣山謁圜悟禪師契此三昧深藏眾底二十餘年未有明辨得出者盖其平生徹證超出過量履踐穩密未易一言半句急於人知也紹興四五年間此三昧敗露光明燭世如大日輪昇太虗空有眼者見其光明清淨無壞無雜山河大地依此光明發生萬物日月星辰依此光明炳曜癡昧地獄天堂依此光明而住善惡一切群動依此光明頭出頭沒衲僧依此光明啟大爐鞴提弈世鉗鎚碎聖凡窠窟斷佛祖命根命根若斷覔其光明來處了不可得盤山和尚道心月孤圓光吞萬像光非照境境亦非存光境俱亡復是何物雲門和尚道盡大地是光喚什麼作自己若識得光去境亦不可得有什麼屎光境光境既不可得復是何物學道流向箇裏如何支準若是打破漆桶底漢便知二老落處既知二老落處且道在光明裏不在光明裏若道在光明裏雲門又道有什麼屎光境若道不在光明裏盤山又道光吞萬像所以道打破漆桶後須是遇人始得若不遇人到箇裏失却透關眼若是打破漆桶曾經本色宗匠爐鞴中出來如百煉真金如猛虎插翼如金翅吞龍方謂之真法王種草也示通修造昔大隋和尚參七十餘員善知識具大眼目祇一二而已其佗皆具正知見香林見雲門十八年作侍者凡一言半句錄於紙衣下舉此兩端深知古人為法誠切到透處烜爀逈出羅籠機關表裏情解之外所謂師子王不妄哮吼也近世宗門淡薄病在於何病在當人不自信處且此病從何而起盖從因地不正而起因地既不正雖致身叢林視叢林猶驛舍雖說參禪聞禪似鴨聽雷舉此兩端亦見今人與古人相違也其間設有因邪打正方知佛祖深恩難報則知二大宗師不誣矣示璋供頭本色道流夙有般若種智纔出頭來其氣槩勁直於最初一步卓然超絕與泛泛者不同盖末上親近真正宗匠至於一言半句終不妄誕然此一段事初非明悟知見可擬又豈是世智辯聰而能彷彿者哉是故羅山云上士脚纔跨門便知宗旨猶怕繩床上老漢瞌睡更回頭與一探若是作家暫挂瓶盂亦恐繩床上老漢瞌睡未醒口裏水漉漉地不是泊船處便去俗人家寄宿去看佗透底人驀露箇消息直使天下衲僧無絲頭許湊泊亦不令守住無湊泊蹊徑所謂驅耕奪食手段誠間世而出又安可與時輩和泥合水瞎學者眼耶示圓鍾頭釋迦老子已前曹溪大鑒之後諸大老宿已來的的相承密密符契亦不出乎當人二六時中一動一靜一語一默之間果能不昧初志於此直下頓見本地風光則與從上佛祖把手共行同一受用提持千聖近傍不得底萬靈景仰無門處頂𩕳上一著子不獨與一切人解黏去縛至於四生九有三途六趣俾各徹證根本箇箇洞明正知正見豈不是大丈夫成就大丈夫事臨濟道我二十年前在黃蘗先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓喫誰為下手時有僧出云某甲下手臨濟拈拄杖度與其僧擬接臨濟便打看佗顯示此箇大法不妨超宗異目豈似而今依草附木之輩恣縱無主孤魂坐在第八識裏團量佗向上人大機大用正如螢火燒須彌山之說歸宗年來寂寞太甚也思得六十棒喫誰為下手忽然圓上座出來道法圓下手祇向伊道待你鑄鍾了則分付拄杖子示章修造佛眼叔祖初領淮右龍門殘僧破屋而已不逾年天下英特之士屨滿矣未及數稔一寺鼎新於是東山之道大振天下建炎末紹興初兵火民物糜滅幾盡獨龍門存焉盖此老人般若智勝行願宏博而世數豈能動毫芒耶昔甞示徒云你為我修造我為你說禪我將金彈子愽你泥彈子好言語理上也透事上也透所謂理事融徹會盡諸法無生雖不呵佛罵祖佛祖安能迹其前雖不行棒行喝棒喝安敢措其用當知佛眼叔祖之道太虗空不可等量玄妙泯默豈可圖度哉是故參學人若得泥彈子透便知金彈子落處若得金彈子透便知泥彈子落處者箇臨濟吹毛劒若善操持大功不宰儻或躊躇未免自傷己命示政化士巖頭和尚道大凡唱教須從無欲中流出三句祇是理論咬去咬住欲去不去欲住不住或時一向不去或時一向不住誠哉是言也從上具大眼目宗師皆得箇些子說話所以掀天動地孤峻處湊泊佗不得平實處捫摸佗不著逆順中佗不見謂之衲僧巴鼻圓悟師翁凡示學者曰我有一句到你老僧自著喫棒若無一句到你你便自陷地獄看佗得箇些子說話底事分正如金翅擘海直取龍吞無異也又道夫為善知識據曲彔床若無擒虎兕辨龍蛇眼未免被覺者吞却己謂宗門祇如是也豈不見明招到泉州坦長老處坦云夫參學一人所在亦須到半人所在亦須倒明招便問一人所在即不問如何是半人所在坦無語後却令小師問明招云你欲識半人所在麼也祇是箇弄泥團漢歸宗將謂明招曾見作家來必有驚人之句如何却作野犴鳴且道節角在什麼處示茂先二化士一大藏教且不是黃面老人說底直指人心且不是達磨大師傳底祇者兩著殃害天下衲子求生不得生求死不得死正擬議間驀地被人推轉一刀兩段血濺梵天向歸宗門下猶是掇洗脚水底漢未曾夢見我先祖意旨在豈不見臨濟在黃蘗問佛法的的大意三度被打六十拄杖興化久參臨濟末後見大覺至脫衲衣處忽然大悟親見臨濟在黃蘗喫棒底意旨欲紹此箇門風初無佗術別沒聱訛一味硬却脊梁竪教透去則盡大地人性命祇把斷貫索穿却更無一箇漏網底豈不是大丈夫漢成大丈夫事也示鑒化士叢林英俊之士氣宇不群凡所至處終不妄通消息設吐露一言半句必有來由雖有未徹底領略却受人整頓盖智識精明使其然也唯是拍盲者不問是不是祇信彩撒將去貴人說伊會祇對不知正是折本經紀也仰山在百丈時口吧吧地丈云汝佗後遇人在後到溈山山云子在百丈問一答十是否仰云不敢山云佛法向上道將一句來仰山擬開口被喝出如是三問三擬答皆遭喝出仰山低頭垂淚云先師向我道佗後遇人今日便是也從此發心入山看牛三年一日溈山入山見在樹下坐禪以拄杖點背一下仰山回首溈山云寂子道得也未仰云雖道不得要且不借別人口溈山云子會也所謂動絃別曲葉落知秋至於臨濟在黃蘗處三遭痛棒後來出世示眾云我當時在先師處喫棒如蒿枝拂相似凡養子要如二大老始可起宗也祇如臨濟仰山悟去成得什麼邊事若檢點得出許你入阿字法門示感化士道人之心其直如絃在在處處若倚天長劒世間富貴驕奢五欲八風入作無門名利是非四生九有籠不住得到這田地便是取黃面老子命根時節也豈祇一生兩生堅勁行願所致乃是積劫熏煉種智純熟至於歷諸勤苦然後乃可引跂大方超然獨步者也古云無一法從懈怠懶惰中生又云久受勤苦乃可得成此真實語不誑語不妄語也果一旦透去千人萬人羅籠不住呼喚不回它時異日孤峯頂上呵佛罵祖則不忝矣豈可飽食終日成群作隊說黃道黑略無少念回光反照我今此身四大所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地涕唾膿血津液涎沫大小便利皆歸於水煖氣歸火動轉歸風四大各離今者妄身當在何處箇裏急著精彩若作地水火風商量釋迦老子盡塵沙劫無出頭分不作地水火風商量如將魚目而比明珠二途不涉無異𦘕餅充饑三十棒歸宗自喫不干諸方事示禧莊主頂門一機千聖罔措思而知第二頭不思而知第三首要在當人直截荷負卸却從前學解明昧兩岐到淨裸裸處更須轉向那邊見佛殺佛見祖殺祖向衲僧門下猶是奴兒婢子邊事大丈夫漢莫向禪床角老和尚口邊覔禪覔道覔玄覔妙𡎺向臭皮袋裏為究竟法不亦謬乎睦州凡見僧云見成公案放你三十棒俱胝見僧竪指秘魔見僧擎杈至於玄沙未徹從上諸宿德無不的的痛處提持如大火聚孰敢近傍近傍則燎却面門又如金翅擘海直取龍吞更無回互有如是氣槩具如是英特方可稱為大丈夫事莫祇守老鼠見解弄三寸光巡門傍戶見人道好從之於好見人道惡從之於惡誠可憐憫麻谷一日持錫至章敬遶禪床一匝振錫一下卓然而立敬云是是又持錫至南泉遶禪床一匝振錫一下卓然而立泉云不是不是谷云章敬道是和尚為什麼道不是南泉云章敬是是汝不是此是風力所轉終成敗壞參學人到此如何緇素若善參詳好惡自分耳示嚴教授宣教達磨大師未離西土已是七錯八錯既把不定遂航海游梁歷魏九年少林露箇消息謂之單傳直指其納敗愈甚事不獲已將錯就錯以心契心初無毫末許得底道理所證祇證自本法且如何說箇本法莫是以心契心為本法耶以無所得心為本法耶不是心不是佛不是物為本法耶總恁麼為本法耶總不恁麼為本法耶若如此領略正如刻糞作栴檀形盡未來際祗作屎臭氣縱饒辯似懸河機如掣電也是掉棒打月者些子須是悟底人方知落處而今說箇悟是治顛倒語從上若佛若祖觀一切眾為從無明流入顛倒從顛倒流入諸趣路頭既錯改頭換面造種種業謂之從迷背悟若夙植善根從善知識言下心地開通徹本來面目便謂之返迷入悟然而迷時又何甞減一絲頭悟時何甞添一絲頭迷時則迷悟底悟時則悟迷底迷悟既徹生死根斷直下如紅爐上一點雪相似佛也祖也凡也聖也逆也順也好也惡也長也短也至於得失是非俱著不得於著不得處事事著得譬如虗空具含眾像於諸境界無所分別又如虗空普遍一切於諸國土平等隨入塵塵剎剎全是箇大解脫門佛法世法打成一片便是從前未舉意參禪時身心一般肚裏更無許多惡知惡解所謂悟了還同未悟時是也到此境界方謂之不疑之地亦甞面諭不疑有兩種見徹本法到究竟大安樂處故是不言尚恐坐著有一般拍盲不疑自謂從本無迷今亦無悟及乎徵詰無迷悟處又却去不得豈不是拍盲不疑此是焦穀敗芽斷佛命根出佛身血之輩烏可與語哉古來老尊宿窮究此一大事不是容易直是子細安似今時長老擔夯得重何謂如此有般底得箇見處了便休更不就人決擇被人拈起一件物頓在面前分踈不下便渾崙吞却口頭雖說不疑肚裏畢竟有塊物不能消化此便是生死根本也有一般底得箇見處坐著見處見地不脫一向說玄說妙廣陳蹊徑謂之為人此便是喪達磨正宗魔子也有一般底做工夫到箇靜處身心稍稍輕安一向坐在無人之鄉見人說著好事便生煩惱返言禪道本無所說所以雲門道一切處不明面前有物者是也此病最苦有一般底得箇見處蕩蕩地無佛無祖無諸聖一向無將去行盜行淫飲酒食肉謂之無礙禪此是地獄種子也永嘉云豁達空撥因果莾莾蕩蕩招殃禍此之是也有一般底見處泯默無聞一味噇却常住飯了祇管死葛怛地守却被位等箇悟處此便是深山大澤中一間破屋下泥團謂之無轉智大王徒消信施耳其實本分參學者初無許多棲泊處渠自有超宗異目生涯且如嚴陽尊者問趙州一物不將來時如何趙州云放下著趙州知佗病正在這裏便與放出毒手去貼肉汗衫非此手段不可救也嚴陽尊者既不領略又問既是一物不將來放下箇什麼趙州又對佗道放不下擔取去者一句子更是辛辣過如喫痛棒從上古尊宿履踐此事直是透到無秋毫子過患處方敢據位為人師範豈似今時衒聲利輩亂瞎人眼也面諭為人一著子須是自得之古云得之於心應之於手臨機初不費絲毫氣力剔將出來活鱍鱍地左之右之皆在吾網中不可說這一箇公案是為人處那箇公案不是為人處切忌作此解殊不知當臺明鏡妍醜自分耳羅山老漢道我這裏祇有一口劒劒下有分身之意亦有出身之路從上老宿弄將出來千差萬別無不從脚跟下流出變通逸格殺活自在巖頭道若論戰也箇箇力在轉處豈不綽綽然有餘裕哉示達化士德山未遇人時𡎺一肚皮葛藤流入八萬四千毛竅化為精魅魍魎各各放無量神通及見龍潭一點也用不著然後知非乃云從今日去更不疑天下老和尚舌頭也信之此事初不在聰慧多聞處亦不在澄澄湛湛處亦不在長坐不臥處亦不在寂寂惺惺處若是其中人動絃別曲葉落知秋其如未能究竟當如德山見龍潭一番子方可入爐鞴受鉗鎚也
