body:
  text: 法語下示諒禪人東林門下無禪道佛法無向上向下無之乎者也無得失勝負雖聚衲子唯以金剛圈栗棘蓬跳者不可著力跳吞者不可著力吞但退步冷地裏驀然體得如晝錦還鄉千人萬人中一人半人而已其間肚皮熱底祇得仰仰羡羡要且覔他從來處不得祇是人人腳跟下本分事即非強生節目是故從上老作家非不以此本分事揭示來學祇貴各各猛著精彩直截荷負深入先達閫奧臨濟金剛王寶劒德山末後句藥嶠一句子祕魔叉俱𦙁指雪峰輥毬趙州勘破女子出定靈雲見桃花玄沙未徹此皆一致爾苟有一絲頭及之不盡則禍生也大底英特之士不在忉怛巖頭道利根底一咬便斷知他多少省力然後見佛殺佛見祖殺祖猶是衲僧門下脫白沙彌可中逸格超量豈影響之流而能近傍哉祇如坐斷天下人舌頭底還有出身處也無試請諸方代一轉語看示潮上人黃面老子四十九年說一藏之乎者也其間是是非非長長短短故不勞餘力洎至末後看他無折合却對百萬衆前拈花付囑其誣之罪不輕至於達磨西來直指人心見性成佛果然聽事不真喚鍾作甕設使具大丈夫氣槩有潑天大生涯二六時中腳跟下放光動地愈沒交涉這些子沒人情痛下毒手打翻從上佛祖機關玄妙理性師授子承口耳傳習之弊如紅爐上一點雪且不是本地風光亦非衲僧巴鼻更說百丈耳聾臨濟三頓興化脫下衲衣雲門拶腳折雪峰輥毬趙州勘破狗子無佛性明眼人落井以諸大老敲甎打瓦轉見狼藉苟非明悟此旨切忌莾鹵承當蓋參學初無他術祇要放得下一味無心去自然合道近來有一種不通方謬漢或以壁立萬仞為尊貴或以泯默無聞為極則或以一切語言文字為變通如此之類實可哀哉且道東林見處如何今年八月十八日清光看壓海潮來示行者了無出家乃大丈夫事何待削髮然後親近知識盧祖微時鬻薪於市聞客誦經激其本願謁黃梅大滿一見投機隱於碓坊因聞秀寫偈略露鋒鋩授衣南渡至庾嶺為蒙山道人以不思善惡本初面目斂念知歸尋抵番禺顯風幡不動動自於心之語聞了駭然看他祖師從微至著揭示本法蓋非它術乃自心之達耳豈待削髮而後見善知識是也示行者了心割愛辭親為如來種學出世法了世間相即是實相矣所謂是法住法位世間相常住吾知之矣汝知之乎事佛之要勞形苦骨長年不倦為衆之念臥草眠霜至死不厭能行是者是真出家示檀越徐將仕鷲嶺拈花少林直指黃梅夜半大庾嶺頭自爾曹溪之後此道大振無非是祇今當人頂𩕳上二六時中受用底一著子或為佛或為祖或為寶公或為十二面或為三十二應身或為千手眼通其變則虗空為口萬像為舌盡未來際說甚隨類示權應機赴感卒莫能窮詰其本豈特寶公倒退三千里便是黃面老子也無安身立命處雖然恁麼也得不恁麼也得恁麼不恁麼無不中的至於天下老和尚據曲彔木床揭示本法與一切人解黏去縛抽釘拔楔施向上鉗鎚碎衲僧窠臼其間一箇半箇皮下有血遇本色人輕輕一劄直下頓脫從前學解明昧兩歧卓然挺特觸目遇緣曾無二致以是願力現殊勝相或為宰官或為居士或為長者或為比丘各各契所得心廓大解脫門俾一切品類已知有未曾有悉皆洞明超生離死絶塵絶迹一段奇特大事到大休大歇十成絶滲漏處四生九有五欲八風頓然清淨使各各頂門金剛眼正開大施門濟所未濟應所未應豈不是大丈夫具超群逸挌點鐵成金底大手段也示檀越鄭承務上根大智點著便知落處又豈在搖脣鼓舌然後謂之指南誠發明眼人一笑耳是故西天四七唐土二三唯以心契心初無心可得若向無心處作道理還同有心然心之說易會難明所以祖師道無心無可得說得不明法若了心非心始解心心法看他祖師揭示從上佛祖所契心法豈是和泥合水未得謂得耶縱饒風吹不入水灑不著尚恐涉脣吻落路布則隨後與之痛上錐劄俾之脫去所得所證之妙到千人萬人羅籠不住處亦未是好手更須轉向那邊撥動向上關捩初不傷鋒犯手悉使盡大地人各各活鱍鱍地豈不是大丈夫具大丈夫事業苟有絲頭許及之不盡未免打入葛藤窠裏成群作隊造地獄業將謂吾佛祖之道止此而已大抵參學末上須就有道宗師禁得辣手段受得惡拳躍透到休歇安隱之地其逆順境界喜怒哀樂五欲八風悉皆清淨不可思議大解脫門則何往而不利哉示珣禪人東山演祖云四來兄弟各各呈見解及乎徵問子細有者喚作禪道會有者不喚作禪道會要且本分事全無些些誠哉此言臨濟正傳無出此也又道世人殺佛殺祖造無間業一念回心却許懺悔唯參問未達其由畢竟成謗般若永劫無由出期學者當事斯語以悟為則若是學解傳習口耳之流此報難逃耳白雲太師祖道直須悟始得悟後須遇人始得你道既悟了便休又何必須遇人若悟了遇人底臨垂手方便之時著著自有出身之路不瞎學人眼若是悟得箇乾蘿蔔底不唯瞎却學人眼兼自已動便傷鋒犯手了也嗄昔年便有箇乾蘿蔔底甜却牙齒東道西說而今乾底也無濕底又沒教緇素箇什麼即得有時冷地看來恰如患啞箇直是好笑其為人手段固遠之遠矣示振禪人少室生涯若未踏著如履刀山劒樹其艱難萬狀禪人從此多退志遂為廢人耳蓋乎平生操稟不彌確履踐若存亡縱使親見釋迦老子亦無奈你何箇事須是具大丈夫意氣把從前學解明昧兩歧直下一刀兩段祇向十二時中紅塵堆裏逆順界中忽然信腳踏著舊時活路通上徹下全是自家出身要徑豈不至哉且如石鞏問西堂汝還解捉得虗空麼西堂云捉得鞏云作麼生捉西堂以手撮虗空鞏云你不解捉虗空西堂云師兄作麼生捉石鞏把西堂鼻孔拽西堂作忍痛聲云大殺拽人鼻孔直得脫去鞏云直須恁麼捉始得看他古人得處超量用時勦絶等間𡎺著如大火聚豈有許多搕𢶍雖然也是喚鍾作甕示慧禪人黃面老子初生下時便道天上天下唯我獨尊後來雲門道我當時若見一棒打殺與狗子喫却貴圖天下太平此便是初生下帶來一星蠱毒子雲門中之便知落處拈來用得恰好居常以此事告示學者既作黃面老種草須會祖翁說話始得若不如此盡是掠虗漢一日雲門普請般柴擲下云一大藏教祇說這箇看他古人顯示頂𩕳上一著如同電拂利根底一覷便透其或尚留觀聽坐在見聞向衲僧門下何啻白雲萬里示如化士昔水潦和尚問馬祖如何是西來的的意祖乃當胸踏倒水潦忽然大悟起來拊掌大笑云也大奇也大奇百千妙義無量法門只向一毫端上識得根元去也看他英特之士一等踏破草鞋見善知識終不半前落後直是操鐵石心到大休歇處驀地箭鋒相拄如龍得水似虎靠山故是慶快不妨孤峻究竟論之也祇是明見本來自受用現成金剛正體亦不足為之差也此體未明時謂之地水火風無明妄想顛倒近世有等尊宿凡示學徒但云地水火風無明妄想顛倒外別有一段事此真可憐憫也便是西天九十六種亦不作此見解本色道流或聞或見得不寒心毛竪晚之學者宜速遠離此患乃可為如來種草也示伸化士衲僧家活計最徑截不用起一毫頭氣力立地成佛作祖蓋緣近時學道人探頭太過將謂別有道理一味向意根下妄通消息被情識機關流入生滅法中執生滅法為安樂究竟處其錯之甚所以道無以生滅心說實相法譬如有人妄號帝王自取誅滅況復法王如何妄竊信之上祖門風峻絶豈容依倚棲泊者哉唯是有力大人方能臨危不悚直下頓徹本法如大火聚誰敢當頭覷著臻上人為百丈持鉢求語佛祖緊要處毫髮不容驀地踏著此脉却有共語分近時參問道流多是執我見為究竟法略不信有好事才入本色爐鞴中則討頭不見也蓋緣末上不遇人承當處莾鹵坐在得失窠子裏怕人動著恐輸却禪或者云我見處一切是了長老家却言不是此祇是用心行要羅籠我拽轉我但自把得定便休此膏肓之疾固不足發藥參學人切忌此耳示曇禪人少室家風祇要當人端的喪却本來面目然後方可入作若不如是盡是依草附木精靈德山道吾三十年提持此事未嘗見有一箇獨脫出來底圓鑑和尚道直饒獨脫出來也是依草附木精靈看二老揭示直指之要豈有一絲頭許與人領覽至於自得之妙向衲僧門下猶是貼肉衫子除非大達之士乃可髣佛耳靈源不昧萬古徽猷入此門來莫存知解又道若有一毫頭凡聖情念未盡未免入驢胎馬腹裏去古人懸塗毒鼓祇要求箇會擊底人儻善擊之少室家風一任擎展示茂化士見性周遍聞性亦然洞徹十方無內無外所以道隨緣無作動寂常真如是施為全真智用是故巖頭初參德山執坐具上法堂瞻視德山云作什麼巖頭便喝德山云老僧過在什麼處巖頭云兩重公案德山云者箇師僧稍似行腳人然則父慈子孝其奈來處未諦當參學人者裏撿點得出便知二老人如是施為全真智用少室高風未至寂寥哉祇如巖頭便喝為復理合如是為復別有生涯近世禪者被人拈來詰著多是渾崙吞箇棗死在得失窠裏白雲太師祖道須是具緇素眼始得若不具緇素眼未免瞞頇佛性儱侗真如且作麼生是緇素眼破木杓示璫化士學道人莫空依草附木過生打辨精神透教徹去老黃龍未見慈明時一肚皮禪口似紡車及其見之挺然超詣大哉此老有是起必死之疾手段也長慶參雪峰玄沙往來三十年非不精究此道然未登太山豈敢小天下也一日見卷簾猛省有頌云也大差也大差卷起簾來見天下有人問我解何宗拈起拂子劈口打是謂登太山耶錯示琚化士祖師西來特唱此事祇貴言外領略直下透頂透底何待禪床角頭朝呪暮呪然後為佛法禪道正是瞎人眼又不可舍師承而自求自求而得真九十六種眷屬也長慶拈拄杖云識得這箇參學事畢雲門道識得這箇為什麼不住二老漢優則同優劣則同劣垂手處足可稱尊若是入理深談猶缺悟在示照知殿大道坦然本無迷悟良由衆生顛倒從妄而興背覺合塵起諸差別遂有四生六趣九有致使流浪三界無有休息如汲井輪互有高下皆謂之迷儻能於其間聞一善言見一善行一念知非直下頓至如來不動之地此謂之悟也然迷悟之由且初自何而起謂從心起心不自心謂從妄起妄不自妄則心之與妄其安在哉當知十方虗空生汝心內如片雲點太清裏如是見徹即知十方虗空不可得故虗空既不可得山高海深纖洪長短目前摐然又如何消遣箇是萬仞崖前一涉子才入顧藉衲衣下事無緣究竟也思之示一化士東寺和尚道心不是佛智不是道劍去久矣爾方刻舟此正如善射者不問中與不中蓋妙在意前發必中矣參學人亦復如是欲期洞明大法須辦䥫石身心悠久自然諦徹透到大休大歇處亦不問生之與死也聞菩提涅槃真如佛性如風過樹耳箇些子若打不脫直是礙塞人從朝至暮恰如打殺人了未曾還命在此是做工夫到好處也不久漆桶破也捉獲白拈賊也自納敗闕也收捨不上也破家散宅也沒著死尸處也衲僧家到得箇田地後是則是快活無憂若不就本色宗匠鉗鎚便打入撥無因果隊裏去卒牽挽不回永嘉云豁達空撥因果莾莾蕩蕩招殃禍於宗門所害非輕豈不見僧問古德云上無攀仰下絶己躬時如何古德云放下著起膏肓之疾無出此也示淳化士從上佛祖無一念心要做大漢生死大事方得成辦然後大漢自然而至始謂之釋迦種草也若有一念馳求成佛作祖底心此謂之焦芽敗種無復發生也年來學道人凡見尊宿不問如之若何祇要人道他有箇見處便歡喜殊不知歡喜底便是討閻羅王鐵棒打鬼骨臀欵子也若是箇漢祇要人道你未在却堪持論示延壽雲長老從上宗師是第一等放下底人才出頭來掀天括地至竟緣何如此祇是末上一念正當其邪師魔外籠不住便有超宗越格氣宇不亂親近至世間起滅了然無寄唯以生死作頭底正作頭底時不見有死及不死底此是古人做工夫處向這裏斷要徹底明白擴而充之然後禁得辣手段到千變萬化處尚恐討頭腦不見何況半陰半陽半晴半雨而欲獨步大方無復得也箇一著子自古自今一箇半箇透得底如鷹拿燕似鶻捉鳩有甚費氣力處回視從前參得底悟得底學得底淹浸得底直是慚惶殺人始知從上宗師是第一等放下底人方得這箇柄入手便有掀天括地分所謂間世英特之士無出此也近世道流不務本但貴肚皮裏記持多口裏有可說祇對士大夫資談柄快神思謂之禪道此大妄語所招重報千佛出世不通懺悔是他古人初無道理一味古朴百醜千拙要是肚裏非常惺惺蓋渠專於道故也一旦驀地咬斷五色索子跳出解脫深坑透過悟迷兩字不妨慶快乎昔忠國師示學者云身心一如身外無餘雲門云山河大地何處有耶看他下箇注腳逈然超絶一鎚下便要平步青霄雖然直饒恁麼也是依草附木示覺禪人菩提離言說從來無得人德山道我宗無語句亦無一法與人趙州道佛之一字吾不喜聞看他恁麼吹沙走石早是瞎人眼了更向棒頭上討活路一喝下覔出身句無異捕鼠口求象牙也所以從上護惜箇一著子二六時中直是無絲頭子虗棄做到無捫摸處湊泊無門時却須放下令教虗靜澄湛應干從前知解道理惡知惡見悉皆入作不得便是入道要徑也一旦洞明腳跟下事徹底透脫去亦不辜負釋迦老子苦口丁寧所謂師子兒衆隨後三歲便能大哮吼若是野犴逐法王百年妖怪虗開口示達禪人本分衲子蘊超今越古底氣宇抱成佛作祖底英槩直下斷與生死做頭底到詞窮理盡處死生關脫如萬仞崖頭撒手豈肯顧藉至絶氣息時全體活鱍鱍透從上大眼目宗師放手腳弄出驚群動衆底餘態如珠走盤如盤走珠顯示佛祖拈不出生機一路如龍得水似虎靠山向棒喝未施前坐斷電光石火在機用普應間不妨風行草偃雖萬化千變其實湛然凝寂初無依倚一味單提接最上機不立階梯豈居陰界謂之宗乘教外別行撥轉關捩不容擬議至於拈花鷲嶺直指少林曹溪脫印子亦不出最初一念又曰頂𩕳上一著是他得底二六時不露鋒鋩等間躍出十有五雙蹉過古德云此事唯我能知是也示曇禪人上古老衲心眼未明火急就有道而正之一旦心眼洞明以本願力晦迹山林辦纍生計揩磨心識使及之淨盡無纖毫過患至遇境逢緣視之如墻壁瓦礫絶無一念世間心若太虗空湛然凝寂謂之金剛正體淨裸裸地圓陀陀地然後以無功用行雖無心應世而應世之心常而無間雖無心濟物而濟物之心霈然無窮當知上古老衲就有道而正之契證之妙皎如十日並照豈造次承荷者哉示徐伯壽道友佛祖閫域深奧無際蓋古今固難其人苟非上根大智孰可造詣者哉要在頓信誠確然後乃見捕至覷捕之時不可以有心求切勿以無心會又不可離有無而別作勝解也亦不可即有無而求出離也學道人但能於此著精彩唯是所示之要久之不患不徹證也龐居士問馬大師云不與萬法為侶者是什麼人馬祖云待汝一口吸盡西江水即向汝道龐公言下大悟便云十方同聚會箇箇學無為此是選佛場心空及第歸此豈不是透生死截徑打破牢關底意氣儻涉道理即打入野狐隊裏去也大抵斷要洞明此事須是決烈之志向二六時中六根門頭常時放教淨裸裸地雖處紅塵閙市酒肆茶坊如在清淨大解脫門無為境界堪然凝寂如一座須彌山相似五欲八風搖撼不動千魔萬難籠無門祇者便是得力做工夫入道之蹊徑也直下從腳跟下推究將去至成佛地方見得不願作佛之元由也從上老宿喧天動地祇用箇些子在佛祖謂之頂王三昧在衲僧謂之祖師巴鼻在平江人謂之頑賴須知頑之一字是衆妙之門入得此門千足萬足耳令人胡氏求法語向上一路非男女等相但直下著精彩二六時中捕驀地穿透即是令人無量劫來受用底事今日現行不曾移易一絲頭又豈可別有道理也既信得此段大事因緣及便徹底放下趂康健直教生死兩字洞然明白豈不快哉大底人生到老稀之年是時節至矣應家務事掉與人荷負者貴得腳跟下輕便臨時去住自由胡六七娘求法語祖師道心自本來心本心非有法有法有本心非心非本法胡氏六七娘要見祖師妙心至容易事但祗退步向行住坐臥處喫茶喫飯處語言三昧處觀世煩惱處猛著力一提提取便是祖師所契之心與自所證之心無二無二分無別無斷故威光烜赫得大自由豈不是出格真道人也胡令人宅萬二小娘子求法語世尊有密語迦葉不覆藏箇是從上佛祖得力處善知識劈頭拈出不問是男是女才宿有靈種底一見便知落處豈在忉怛然後知歸耶古之凌行婆鄭十三娘皆見諸大老宿悉證無生法忍吳氏千一娘有信佛之心但將此心朝夕推究驀徹去當知世尊密語不覆藏之句祇是自己無盡寶藏也書答翔鳳山顯忠資福詮長老法嗣書老僧自幼出家正因也方袍圓頂正因也念死生未明撥草瞻風親近真善知識正因也至於出世領衆今三十餘年未嘗毫髮厚己也方丈之務未嘗少怠也晝夜精勤未嘗敢懈也念衆之心未嘗斯須忘也護惜常住之念未嘗敢私也行解雖未及古人隨自力量行之亦不負愧也痛心佛祖慧命懸危甚於割身肉也念報佛祖深恩寢食不遑安處也念方來為道衲子心地未明不啻倒懸也雖未能盡古人之萬一然此心不欺也長老隨時吾三四載凜然卓卓可喜去年夏末命悅衆是吾知長老也吾謝鍾山寓宣城昭亭未幾赴姑蘇光孝方兩月長老受鳳山之請道由姑蘇首來相見道義不忘如此也別後杳不聞耗正思念間懷淨上人來承書并信物方知入院之初開堂為吾燒香乃知不負之心昭廓也今既為人天眼目與前來事體不同也果能如吾自幼出家為僧行腳親近真善知識以至出世住持其正因行藏如此行之則吾不妄付授也又何患宗門寂寥哉至祝無以表信拂子一枝法衣一頂幸收之紹興壬午七月初七日住平江光孝應庵老僧某書復
