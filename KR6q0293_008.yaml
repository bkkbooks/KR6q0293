body:
  text: 法語中示正首座往濠州幹修造本色道流參問祇要敵生死終不向古今䇿子上討諸方舌頭邊覔唯是退步就己冷地裏根蒂下切切提撕忽然手蹉腳跌納敗一場便是生一參學事畢於孤燈獨照時始見有力如一座須彌山何處更有生死怕怖動搖去來底道理死心和尚問魯直聞説公會禪諸方皆許可是否魯直擬議死心云老僧有一問問你它時後日彼此燒作一堆灰時如何魯直忙然千千萬萬人向這裏𨁝跳祇是踏不著且道誵訛在什麼處報恩一日問正首座燒作一堆灰時如何正對曰惱亂春風卒未休他如此祗對是會耶是不會耶頂門具眼底試辨這漢看示範化士西天四七唐土二三無不以頂𩕳上一著直截顯示奈緣學者困於知解泥於見聞坐在必死之地不能洞明從上諸祖直截顯示之由所以古德道學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人看他得底人等間吐露一言半句不妨超宗越格便有直截荷負之量堪為宗門苗裔豈不是大丈夫特立種草也南泉道王老師十八上便解做活計趙州道我十八上便解破家散宅叢林商量道念茲在茲謂之做活計無佛無祖謂之破家散宅若如此持論其利固無其害甚重欲明二大老之意待應庵三十年後換却骨頭了與你説破示彭道清善友治身之端正在己也千里之步貴在初也善此二者百千法門無量妙義畢矣故謂之無盡藏三昧又謂之虗空正體又謂之常住不滅在衲僧門下又且不然眼觀東南意在西北不可以無心求不可以有心會不可以語言造不可以寂默通非大法洞達豈能縱步千聖頂𩕳哉示寶道人祖師巴鼻無一針頭許祇緣學道人親近太切所以不見若要易明但十二時中一切處放教無心去自然合道道既合則內外中間了不可得直下虗凝逈無依倚古德所謂心心不觸物步步無處所看它向上人行處又何嘗有絲頭取捨意路與人湊泊祇如德山凡見僧入門劈脊便棒臨濟見僧劈面便喝每以此顯示學者祇貴知歸此間有等紕繆強作主宰無主孤魂咸謂赤心片片老婆心切恩大難酬且放過一著將謂識痛癢似此之類故多不復盡舉並不知二老得力處祇一味搏量恣情卜度師與弟子㸦相印證不惟沒溺自己亦乃陵辱先宗欲明二老人端倪切忌狂狗趂塊示忠首座鷲嶺拈花少林直指至曹溪之後此道大振天下皆英特俊流克紹荷負非劣根躁進者而能操持也大凡起宗之士一動一靜一語一默逈然殊絶終不肯沒溺死水中為究竟計近年此道凋落愈甚設有一箇半箇初詰之似倣佛至下手時全無巴鼻蓋根本不脫祇是學語之流也看他黃蘗臨濟興化大覺南院風穴首山汾陽諸大老説底話豈止一機一境為實法繫綴來學動是提向上鉗鎚使從上佛祖按下雲頭知有向上事安似而今青黃赤白之輩胡亂引人入草瞎却他眼耶是他古人道悟了須是遇人始得這箇説話須是大法明底方知落處若是徐六擔板卒難湊泊是故我輩沙門合行事非世間心術而可擬量又非寂然不動而能洞達所以道寂是誑語是謗向上更有事在老僧口門窄不能為汝説得學道流若不遇人如何有這箇説話既透得這箇説話了還識福州人吟雪詩麼示徐國寶少室門風無秋毫許至承當時不道無直是萬中無一設有一箇半箇多是栽培得底臨撒手時恰似落湯螃蟹一般何緣如此蓋末上不遇人明見自性不徹遂致斯害也萬一宿植般若種智深厚終不被邪師惑亂而能親近真正宗匠決擇死生大事古德云參須實參悟須實悟此之謂也祇如六祖示明上座云不思善不思惡正當恁麼時那箇是明上座本來面目明言下領旨却問六祖上來密語密意外還別有意旨也無六祖云我今與你説者却非密也汝但返照自己本來面目密却在汝躬看他六祖揭示少室直指之要何嘗有秋毫許禪道佛法到人唯直下揮金剛王寶劒不獨斷明上座命根至天下人命根悉皆瓦解氷消豈不是大丈夫漢成就大丈夫事也然大凡參學道人第一不得記箇元字腳子此是入道要徑又道如經蠱毒之鄉水也莫霑他一滴古人方便無出此也從箇裏去以透脫生死為究竟若別有道理別有方便則真西天九十六種之數無疑耳示機化士古德山未行腳時眼空四海英特之氣逼人及到南方首謁龍潭至吹紙燭處漆桶子破乃云從今日去更不疑天下人舌頭跂步大方無出此老性懆向一槌下便透頂透底與迦文老漢見處不別豈不綽綽然有餘裕哉如是三十年祇一條白棒佛來也打祖來也打要且不是吹滅紙燭處道理直是鐵眼銅睛覷他不破所謂大丈夫事非將相之所能為此之是也大底參學人須具真正知見然後可就爐鞴煅煉尚恐禁當不得遂為退志而況拍盲不知有者而可語乎縱具正知見不遇人猶為見刺所惑不得自在其病又莫大焉大凡參學有地頭人多被此患攪炒脫不得便為滲漏果有志與釋迦老子作苗裔切不可輕結裏決要洞達大法則不墮邪師網中乃第一人也示偉化士真實參學衲子二六時中卓卓地六根門頭裸裸地應世間五欲八風搖撼不動而見聞覺知籠不住亦不舍見聞覺知而求一法亦不即見聞覺知而求解脫如是見徹如是洞達逈無依倚超出聖凡情量亦不依住逈無依倚超出聖凡情量去處名為出格道人然後提金剛王寶劍隨所至處見佛殺佛見祖殺祖見阿羅漢殺阿羅漢所謂出佛身血破和合僧似這般漢不必多止得一箇半箇足可紹續佛祖慧命其臨濟正脈不患掃土誠不虗來閻浮提打一遭是故古德云一等踏破草鞋直須穿教透去豈不是大丈夫漢説底話焉似而今有般呆郎隈隈𣯧𣯧弄盡鬼怪更據曲彔木床妄自尊大又將從上一言半句妄行批判誑惑後昆造地獄業是可憐憫大凡參學末上既非正因至竟祇成廢人設若親近宗師亦是沽名譽利其腳跟下大事無因分曉大事既不分曉則惡業因緣從而和之是以智者改過而遷善愚者耻過而遂非遷善則其德日新遂非則其惡彌積聖賢之語昭著明矣儻不諄諄奉守所誡則人天二路泯絶驢胎馬腹無疑豈不見汾陽云一毫頭凡聖情量未盡不免入驢胎馬腹裏白雲道直饒凡聖情量俱盡亦未免入驢胎馬腹裏二老漢雖把手上高山未免傍觀者有般瞎禿便向者裏問誰是傍觀者則歸宗拄杖折也未放在示儔供頭摩竭掩室自救不了毗耶杜詞却成忉怛更説箇上無攀仰下絶己躬壁立萬仞也是賊過後張弓其餘是甚麼破砂盆一向與麼去盡十方世界一切白醭却且放過了與你和泥合水祇據目前見處畢竟以何為極則灼然十箇五雙是喫殘羹餿飯漢子要箇據虎頭收虎尾底恰如天上擇月而今祇得將錯就錯咬定牙關向定盤星下信彩稱知他是什麼儔禪者本分參學道流相從歲久誠不易得法華舉和尚示徒云行腳人不在觀州玩府看山門景致過時為什麼事蓋為生死事大從上古人凡到所在見箇村院主也須問過如今晚學往往蹉過不肯相博問古尊宿語極有深旨若善提撕紅塵堆裏閙市門頭無非是上人出身截徑也示日化士古之老宿問道之由不較得失但是三尺之童有長處固扣之此方謂之學道人也近世宗徒雖云行腳專理究死生大事其模樣也似古人所存得失甚重既有此患於直指之源不可得而明矣譬如善射者初欲較得失即無精中之期蓋從無得失中習之悠久然後可中其的學道亦然若有一念得失居懷即被得失羈鎖得失之論無它辭故得之為喜失之為怒此皆不祥中起此喜怒其喜怒則人我之根本若了人我根本初無來處即是如來清淨大解脫門所以道從無住本立一切法修山主道法法不隱藏古今常堂堂汝問是不是我答當不堂祇此便是截生死流底要道佛祖頂門正眼也示證化士洞明死生大事不是小緣唯在當人宿植智本深厚專誠參究看是什麼道理第一不得先立箇會處亦不得作箇不會底道理正如學射一般久久到意盡情忘處驀然中的更須知有破的自得之妙也雲蓋鵬參雙泉雅山主令看芭蕉室中示僧云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子蓋經久看之未明一日雅向火次雲蓋侍立雅顧示云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子蓋擬開口雅以火筯攔手一摵雲蓋豁然大悟凡為善知識若無此出格過量逸群大機往往四稜榻地大家草裏輥瞎學者眼則多矣莫是雲蓋擬開口被雅以火筯攔手摵處是出格過量逸群大機麼且喜沒交涉參學人欲洞明其要急著精彩時不待人耳道友孫亨仲求法語亨仲家居東林之右去城七十里營生南畝不多而能辦心延供十方雲水往歲遇大旱其心愈確而不厭其來者野有餓莩獨其家有餘信之願力洪廣而動神物護助也豫領報恩院事嘗憩其堂舉家長齋奉佛嚴肅真在家佛子也每入城首過其門則隨衆衲入室不畏奮拳渠喜從之豫移居東湖亦來不倦此皆過去有緣種今生深信大法也昔日甘行者家接待凡有僧問接待不易行者甘云譬如餧驢餧馬看他打透底人逈然殊絶等間拈起一莖草便是倚天長劒今時流從朝至暮説盡道理未嘗有一句正當琅瑘覺和尚云快把飯來白雲端和尚云琅瑘有不犯之手且道這三箇老漢病痛一般為復有異參學人到箇裏著精彩驀地踏翻乃和二三老人炟赫處佛祖不可及耳示通化士祖師開示直指之要非講較商確持論而能造詣唯是具大根種乃可洞達是故從上老宿親近決擇之暇其履踐處真實無片時虗棄悠久自然純靜豈為世間妄想塵勞包裹也果如此做去驀地一念回光透本來面目便見世間塵勞妄想山河大地色空明暗理性玄妙所從來處一一分曉既得分曉則不被世間與出世間法籠直下打成一片二六時更無第二頭古人又道喚作如如早是變了也者裏急著精彩此事不厭純熟愈退愈進愈晦愈明至臨機大用著著有出身之路豈可使學者平白地死在句下作佛法中歷劫罪人也祇如僧問弘覺山河大地從何而得弘覺云從妄想得僧云學人想出一鋌金時如何覺休去僧不肯雲門聞舉云已是葛藤不能折合待伊道想出一鋌金得麼以拄杖便打是則是雲門血滴滴地要且出他弘覺休去一些子不得有般瞎漢便道歸宗為弘覺作主嗚呼近年此類甚盛不復忉怛也示章化士衲僧家出一叢林入一保社須具頂門金剛正眼不為邪師引入草窠裏做瞞天罪過乃真第一等人也果如此行腳何愁行腳事不辦是故古德撥草瞻風豈為遊山玩水這邊好堂厨那邊有施利受用處穩便唯單與死生做頭底要透向上一段奇特大事到得十成無滲漏處更須轉向那邊千聖捫摸不著萬靈遐仰無門等間蕩蕩地似兀如癡輕輕撥著便解水裏火發方可繼臨濟兒孫也苟專師門格轍限量則被人拶著未免死在鬼窟裏其隈隈𣯧𣯧二十四氣一時現前大丈夫事何其在哉所以列祖出興提持此要無它為此等流也終不隨摟𢳯入野狐群隊中看他上古德山臨濟乘一機示一境如揭貼肉汗衫相似才見刺頭入便與一刀兩段尚未稱從上來事豈可拍盲妄自指注年來參學人咸謂臨濟下兒孫機鋒峻捷此説猶甚怪也善章禪人有志參學不憚數千里來此道集期透生死大事未肯端坐固效古為衆持鉢繼洪州出隊目録袖軸求法語揮翰聊書大槩切忌作言語會亦不容作無言語會到箇裏大事為你不得小事自家祇當示岏禪人有志衲子致身大叢林決定要腳跟下事透頂透底與從上佛祖雪屈豈上蝸角蠅頭而喪己身哉看他臨濟德山興化南院風穴首山汾陽的的紹續為萬世衲子之師雖相去數百年其金聲玉振龍馳虎驟未嘗隔一絲毫許千人萬人仰望不及所謂羅籠不肯住呼喚不回頭古聖不安排至今無處所步步登玄不屬邪正破的手大鉗鎚非諸大老而孰敢當前乎至慈明黃龍翠巖楊岐唱愈高和愈峻自圓悟已來天下九州兒孫遍地蓋源深而流長也是故今日比丘當痛念先祖門風峻活業廣大豈敢癡坐日眠三覺古人有終身之憂無它憂道未達也道既達即無纍生之患是可得而名狀耶便能顯示七佛已前威音那畔一箇大脫空五祖謂一切妄言綺語小脫空是也見本來面目大脫空是也且小脫空與大脫空是一義二義思之示信禪人學道人在乎猛利一咬便斷才擬議即鑽頭入知見網中起結角羅紋分別欲洞明少室單傳直指之要遠矣南泉示趙州云道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶若太虗廓然豈可強是非耶看他古人一期揭示初似刀刀至折合處直使白衣拜相苟或未暗此脈不用敲磚打瓦祭鬼燒錢但向一念未生之際直下如桶篐脫撒一番其塵劫來事一時透既得這箇本柄入手切須牢把住未可輕放下何故前頭有事在正好上門上戶求真正宗師做冤家債主期透向上關穿天下衲僧鼻孔是為難乎它時異日霜露果熟出來與德山臨濟把手共行點檢從上老宿未了底公案俾令後之學者親認祖父契書四至去處一一分曉決定無疑然後承荷家業育子榮孫所謂我本無心所有希求今此寶藏自然而至豈不慶快平生祇如德山臨濟過去數百年如何却要與他把手共行應庵下一轉語看示原禪人大凡行腳人蘊成佛作祖氣槩與流俗阿師逈然不同是他二六時中卓卓地滴水滴凍不妨孤峻所謂先立乎其大者其小者弗能奪也大者既達小者則如大者大者則如小者然後大小雙泯圓融無際在今時猶是野狐窟宅更須一槌打破透向上大機大用放出焦尾大蟲作師子吼既是焦尾大蟲因甚却作師子吼三賢固未明斯旨十聖那能達此宗示祚禪人古來抱道之士如癡似兀豈有一言半句與人咬嚼人自知之患乎不鳴鳴則驚人年來此道荒涼尤甚設有留心叢林者例無正因縱依附善知識殊無道念初不異區區走山水活名要譽之徒也苟得把茆蓋頭略不知分而又狂悖欲竊如來大人境界芘無似之身謂言傳佛心宗況如來大人境界而容妄竊乎其從遊者麞頭鼠目蠆尾狼心傷敗風教比比皆是可不哀哉五湖大心衲子應須遠離所謂見不善如探湯是也示法化士祖師道心有所是必有所非者此説話非上根大智孰可洞明要須盡却今時始透向上關捩子臨濟黃蘗處三遭痛棒所謂攻乎異端斯害也已縱大愚悟去其怪愈甚然豫之言知音者少設鼻聽眼聞者則未與可臨濟出世後示衆老僧一生呵佛罵祖覔罪性如針鋒許了不可得且道黃蘗處喫棒底罪過向什麼處去也凡見僧入門便喝快如倚天利劒鈍似無孔鐵鎚喚作一喝達磨家風一掃而盡不喚作一喝犯突吉羅罪示琮侍者本分參學道流末上為生死不明正如囚禁之人未得決斷至於行住坐臥飲食之間不得少安若如此做工夫其生死大事無有不徹底道理往年佛果圜悟師翁遍扣諸方無有不可其所得者後見白雲演和尚被詰其由元來無本分事祇是一肚皮虗頭白雲向他道勤上座你參底是法座上禪圜悟不肯拂袖而去至金山遭大病幾死思量從前參問並無一句得力才得安樂復見白雲聞舉頻呼小玉之語驀地打破漆桶方始知非信之師資緣會決非等間今時禪人亦在叢林中多年也去見有道宗師亦嘗遭重病心下安與不安皆自知得祇是不肯放下此不肯放下有兩種最初行腳不遇真正宗匠撞入外道邪師火裏中其毒藥便謂行腳事畢是一又有一種雖致身叢林中名為參禪其實無正因一味盜聽反急人知便自證據却但言祇是箇事是其二也此兩種謂之膏肓之病除是一旦知非將來却有放下時節且畢竟放下甚麼祇放下人我簷子得失是非佛法玄妙才如此放下便覺身心輕安表裏純淨二六時中胸次空勞勞地冷地瞥然脫去始可禁拳躍受烹煅若祇守領覽為究竟無異依草附木精靈是它逸格道人逈然殊絶觸著便解生風起草世出世間得人憎無出者一著子謂之衲僧巴鼻是也示通化士昔黃蘗聞百丈大智示再見馬祖深旨不覺吐舌非生而知之孰能領略哉此道至臨濟大行天下若子若孫咸具殺人不眨眼手段覔一箇半箇作將來種草呵佛罵祖猶為不唧𠺕漢豈況和泥合水撒土揚沙以當宗眼無異一牛迹之波擬比滔天之浪是可得耶有志之士果不昧最初一步長時放教冷湫湫地一旦桶底子脫歷劫來事頓然現前不為邪師惑亂一向硬糾糾地風吹不入水灑不著它時異日何患不熏天炙地也不唯符契前百丈大智所示再見馬祖深旨亦將確然特立大方又何啻遇大風則止而已矣示一化士讓祖首起馬駒膏肓之病示以磨甎打車殺佛之要所謂差病不假驢駝藥應平生堅執奉重澳然氷釋從容父子徵酬曾無毫髮滲漏皎然如千日並照臨機八面超情離見到出生入死不疑之地了無生死始終之患爾後以是傳之百丈百丈以是傳之黃蘗黃蘗以是傳之臨濟臨濟以是傳之三聖三聖死且喜太平豈謂興化忍俊不禁向大覺棒下見徹臨濟在黃蘗處喫棒底意旨此老故是聽事不真喚鍾作甕就中奇怪逮今天下老和尚無不以是褒揚殺人刀活人劒乃上古之機鋒亦今人之樞要摧魔破執不得不無其間一箇半箇灑灑落落終不肯坐死水裏與蝦蟆蚯蚓長歌細吟也大底抽釘楔解黏去縛手段以壽後世從今日去斷要箇撲跌不破底點出來與臨濟作種草俾綿綿亘萬世為祥為瑞為風為雷為雲為雨為殃為害又豈徒然者哉示慈修造大丈夫要截生死路頭應平昔珍蓄諸所有物併須棄之則六根門頭自然淨裸裸地一旦瞥去不患生死路頭不斷也苟不本真實履踐而欲多知多解為自得之妙返為知解風所吹增寒壯熱常時現前鼻塞頭昏無日不作蓋自取之禍非它咎也大抵少室正傳直饒徹底悟去折合到十成絶滲漏處更禁得惡拳躍受得沒滋味過這幾重關了亦未稱平生意在當知先達拈一機示一境脫羅籠碎窠臼曾無一針鋒許法與人作道理尚恐他時異日妄生節目搖動學者將為少室正傳合有恁麼事殊不知快不打籬邊示宗書記從上佛祖言教如敲門瓦子事不獲已藉之以為入理之門年來學者不本宗猷反以佛祖言教為極則譬如澄清百千大海棄之唯認一浮漚是可憐憫者有祖已來列派扶宗之士揭示直指之由初無秋毫許與人領略其所示祇示當人本法果能向一念未生時一刀兩段則到臘月三十日懸崖撒手時其五欲八風搖撼無門九有四生收攝無分所謂真大丈夫事豈可與數黑豆死漢輩同時而語耶示感修造學道人圖心要參禪但參取涅槃堂裏孤燈獨照時禪切不可立限劑到幾時幾日什麼時辰決要悟道便是好笑此禪無病痛祇貴退步深信得及高挂鉢囊拗折拄杖硬却脊梁內同木石外同虗空驀爾漆桶一脫五聚十八界蕩然清淨四生九有類頓時解脫既見這一條大路了未是休歇處直到大法洞明方得真偽邪正一一分曉謂之無上大自在法王然後或處山林或居城市初無二見所謂一種平懷泯然自盡豈不是衲僧門下本分草料苟道眼不明力量未充至於逢緣遇境切要牢捉繩頭勿令犯人苗稼應須如法弘持不患己躬大事不明白也昔僧問巖頭路逢猛虎時如何巖頭云拶巖頭好一拶自不知落處示任化士老南云説妙談玄乃太平之姧賊行棒行喝為亂世之英雄英雄姧賊棒喝玄妙皆是長物誠哉是言也大凡宗師居正位揭示本法當如是提持謂之褒揚殺人刀活人劒為臨濟種草苟無箇些子未免拍盲妄生異端瞎人眼去是故死心云譬如死人手持利刃截死人頭來呈吾吾即肯汝所謂善射者未彀已前中的早不唧𠺕了也伶利人聊聞徹骨徹髓何待曲彔床上老比丘重疊打之繞大抵參學儻思前顧後則墮坈落塹無疑矣且如德山臨濟出世弄箇一著子直是驚天動地及到衲僧門下不滿一笑正類學如牛毛得如麟角耳
