body:
  text: 饒州報恩光孝禪寺語録嗣法門人守詮等編師入方丈據坐云現成公案坐斷誵訛錯下注腳捶折你腰撩起便行必死之疾要須英俊別有生涯忽遇衝雲俊鶻來時如何縵天網子百千重上堂舉臨濟在黃蘗處三度喫棒底意旨你諸人還得透也未直饒一咬便斷也未是大丈夫漢三世諸佛口挂壁上天下老和尚將什麼喫飯上堂舉鹽官示衆云虗空為鼓須彌為槌什麼人打得衆無對南泉云王老師不打者破鼓法眼云王老師不打師云二尊宿大似喫李子只向赤邊咬報恩今日與鹽官相見去也虗空為鼓須彌為槌要打便打莫問是誰驀拈拄杖卓一卓下座上堂山河大地草木叢林盡是恆沙劫千佛數直饒信得及去大似掉棒打月東頭買貴西頭賣賤三十年後破草鞋向什麼處著漆桶參堂去上堂舉僧問幽溪和尚大用現前不存軌則時如何溪起繞禪床一匝而坐僧擬進語溪與一踏僧歸位立溪云汝與麼我却不與麼汝不與麼我却與麼僧擬進語溪又與一踏云三十年後吾道大行師云善射者箭不虗發若是箇漢何處更有幽溪雖然只如最初一踏何似末後一踏試檢點看浴佛上堂始從鹿野苑終至跋提河用盡自己心笑破他人口至於拈花付囑達磨安心南北分宗曹溪列派向衲僧門下正如掘地覔天以拂子劃一劃云正當今日是我如來大師慶誕之辰天下叢林一年一度謂之浴佛若喚作浴佛喫棒有分若不喚作浴佛辜恩負義豈不見遵布衲浴佛次藥山遂問汝只浴得者箇要且浴那箇不得布衲云把將那箇來藥山便休去師云遵布衲當時若是箇漢待他道浴那箇不得便拈杓子劈面擲雖然也不得屈藥山何故不入虎穴爭得虎子上堂舉慈明和尚或時方丈內以水一盆上劄一口劒下著一緉草鞋膝上橫按拄杖凡見僧入門便指擬議便棒師云我當時若見便去左耳邊低低地下一轉語待他貪觀天上却與一指才擬議劒便斬驀拈拄杖下座大衆一時趕散結夏上堂僧問人皆畏炎熱我愛夏日長薰風自南來殿角生微涼時如何師云倒戈卸甲師乃拈拄杖橫按云住山僧某甲據菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智老僧二千年前與十二大士同在光明藏中親聞如來金口丁寧付囑向二千年後為末世衆生廣演斯要今正是時報恩不敢囊藏被蓋更為諸人八字打開去也以拄杖卓一卓云先請文殊大士向山僧拄杖頭上為諸人説安居偈護生須是殺殺盡始安居要會箇中意鐵船水上浮次當山僧重説偈言去也文殊據虎頭山僧收虎尾中間諸菩薩隨列生歡喜復以拄杖卓一卓下座虎丘和尚忌日師拈香云平生沒興撞著這無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人恨轉深嚴教授請上堂僧問凝然湛寂有辱宗風廓爾現前猶辜自己去此二途如何即是師云一槌便透進云風捲長空千里靜日輪當午八方明師云未是上座放身命處進云只如僧問楊岐和尚如何是佛答云三腳驢子弄蹄行此理如何師云癡人棒打不死進云未審那一腳落在什麼處師云你又醉也進云忽有人問和尚如何是佛未審如何對他師云劈脊便棒僧便禮拜師云不識痛癢漢師乃云五百力士揭石義萬仞崖前撒手行十方世界一團鐵虗空背上白毛生直饒拈却膱脂帽子脫却尳臭布衫向報恩門下正好喫棒何故半夜起來屈膝坐毛頭星現衲僧前上堂十五日已前水長船高十五日已後泥多佛大正當十五日東海鯉魚打一棒雨似盆傾直得三千大千世界一切衆生悉皆歡喜謂言打者一棒不妨應時應節報恩不覺通身踴躍遂作詩一首舉似大衆蜻蜓許是好蜻蜓飛來飛去不曾停被我捉來摘却兩邊翼恰似一枚大鐵釘上堂謝維邪舉興化問克賓維那汝不久為唱道之師賓云不入者保社化云會了不入不會不入賓云總不與麼化便打乃云克賓維那法戰不勝罰錢伍貫設饡飯一堂至來日齋時化自白槌云克賓維那法戰不勝不得喫飯即便趕出雪竇云克賓要承嗣興化罰錢出院且置却須索取者一頓棒始得棒既喫了作麼生索得雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散師云大小雪竇與克賓雪屈要且無合殺下座解夏上堂舉僧問雲門初秋夏末前程或有人問未審對他道什麼門云大衆退後僧云過在什麼處門云還我九十日飯錢來師云這僧有迎刃底謀略雲門具殺活手段雖然若在報恩門下更須勘過始得下座上堂舉大愚芝和尚示衆大家相聚喫莖虀若喚作一莖虀入地獄如箭射師云好語要且無來處有人辨得出與你一兩金下座上堂盡大地無一粟米大十有九箇刺頭入膠盆有般瞎漢只管説照用同時人境俱奪蓋為爐鞴之所鈍鐵尤多良醫之門病者愈甚報恩更作死馬醫未免撞入漆桶隊裏復舉金峰和尚一日因僧問訊乃把住云輒不得道我有一則因緣舉似你僧作聽勢峰與一掌僧云為什麼打某甲峰云我要者話行師云者僧雖深入虎穴要且未具師子爪牙金峰雖有師子爪牙爭奈有頭無尾汝等諸人還知報恩著力處麼一點水墨兩處成龍上堂僧問呈橈舞棹則不問且道婆婆手中兒子甚處得來巖頭扣船舷三下未審意旨如何師云焦甎打著連底凍進云當時若問和尚如何對他師云一棒打殺進云者老和尚大似買帽相頭去也師云你向什麼處見巖頭僧云劄師云杜撰禪和進云婆生七子六箇不遇知音只者一箇也不消得便擲向水中又且如何師云少賣弄進云巖頭當時不覺吐舌意作麼生師云樂則同歡僧提起坐具云但識取者箇師云放下著復舉趙州一日雪中倒叫云相救相救有僧便去身邊臥州便起去師云者僧如蟲禦木要見趙州天地懸殊有一般瞎漢便道報恩扶強不扶弱殊不知我王庫內無如是刀喝一喝下座元正上堂舉僧問鏡清新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啓祚萬物咸新僧云謝師答話清云鏡清今日失利僧又問智門新年頭還有佛法也無門云無僧云年年是好年為什麼却無門云張公喫酒李公醉僧云老老大大龍頭蛇尾門云智門今日失利師云二尊宿一人觜長三尺一人項短二寸若檢點得出報恩今日失利為佛智師伯雪堂師叔舉哀上堂舉大覺和尚順世謂衆云我有一隻箭子要付與人時有僧出云請和尚箭大覺云汝喚什麼作箭其僧便喝大覺打數棒歸方丈次喚其僧來問汝適來會麼僧云不會又打數棒擲下拄杖云已後遇明眼人分明舉似師云大覺平生用一隻箭子穿天下衲僧鼻孔因甚到者僧面前折却衆中莫有為大覺雪屈底出來與報恩相見有麼如無育王師伯薦福師叔亦未免喫報恩手中痛棒何故有功者賞上堂舉藥山謂雲巖云與我喚沙彌來巖云和尚喚他作什麼山云我有箇折腳鐺子要伊提上挈下巖云恁麼則與和尚出隻手去也師云藥山道頭雲巖知尾雖然頭尾相稱要且不知羞耻饒州東湖薦福禪院語録并序左宣教郎饒州州學教授嚴康朝撰臨濟正宗九傳而至佛果虎丘嫡嗣當代唯其應庵應庵以歷劫堅剛之心見此道光明之本天然師子吼裂破野狐心栗棘金圈不容情解銅頭鐵額也斷命根要識應庵宗綱莫向此紙上卜度壬申六月日日書嗣法門人守詮等編入院僧問居妙嚴已傳道譽住大徹愈播嘉聲布栗棘蓬於德章山中擲金剛圈於鄱君國內掃蕩盲禪暗證建立直指單傳未審如何是直指單傳底事師云無恁麼事進云有恁麼事師云坐斷舌頭進云瞎却了也師云穿過髑髏進云和尚也須照顧面門師云中進云端的瞎師云過這邊立僧問保壽開堂三聖推出一僧保壽便打意旨如何師云正要恁麼問進云三聖道和尚恁麼為人瞎却鎮州一城人眼去在是肯他是不肯他師云分身兩處看進云保壽擲下拄杖歸方丈如何理論師云腳跟下黑漫漫地進云恁麼則橫跨跛驢歸印土倒騎鐵馬上須彌師云怪力亂神僧禮拜師乃云天清地寧時康道泰摩醯正眼洞明肘後靈符光彩譬如善舞太阿終不自傷其手又如壯士展臂不借他力既爾水到渠成自然風行草偃豈不見古德道緣不虗應似鏡臨形若能於心無心於己無己於彼無彼於我無我塵塵壁立萬仞蕩蕩通徹十虗如是則法隨法行法幢隨處建立況饒城勝境伏虎道場因緣時節到來大家拗折拄杖且到家據令一句作麼生道鍛烹佛祖大鉗鎚要與楊岐作頭底上堂現成公案百匝千重峻如嶮崖平如鏡面便恁麼去執之失度必入邪路放之自然體無去住豈不見釋迦老子道譬如琴瑟箜篌雖有妙音若無妙指終不能發驀拈拄杖卓云莫將間學解埋沒祖師心謝首坐書記藏主上堂有僧才出禮拜師云靈利衲僧僧云某甲不與和尚葛藤師云已被纏倒了也僧云恰是師云一釣便上問十年謾與泛禪河今古誵訛透不過趙州喫茶即不問德山托鉢意如何師云一槌擊碎進云恁麼則天上天下去也師云仰望不及進云和尚因什麼高竪降旗師云老僧從來恁麼進云學人亦與麼時如何師云笑殺傍觀進云鍾未鳴鼓未響老漢托鉢向什麼處去德山便歸方丈此理如何師云坐斷天下人舌頭進云只如德山歸方丈有誵訛沒誵訛師云也有誵訛也沒誵訛進云和尚恁麼答話莫不得麼師云也得也不得進云老漢未會末後句在巖頭恁麼道還端的也無師云腳跟下黑洞洞地僧云礫破面門也師云作麼生是末後句僧便喝師云更參三十年進云那裏是巖頭密啓其意處師云路入桃源深處行進云德山次日升堂與尋常逈別巖頭道且喜老漢會末後句要且只得三年三年後果化去又作麼生師云一不成二不是進云又與麼去也師云爭怪得老僧進云只如德山升堂逈別巖頭道只得三年為復是父為子隱子為父隱師云總不與麼進云畢竟如何師云分身百草頭僧云掀倒禪床去也師云只恐不是玉僧禮拜師乃舉趙州會下有二僧相推不肯作第一座主事白趙州州云總教伊作第二座主事云教誰作第一座州云裝香著云裝香了也州云戒香定香慧香解脫香師云趙州下一槌不妨驚群動衆子細檢點將來也是泥裏洗土塊若是薦福門下不用相推第一座也有人第二座也有人第三座也有人雖然不免從頭注過第一座鐵眼銅睛不破第二座陽春白雪無人和第三座真實身心同達磨且道與趙州是同是別若也會得許你具一隻眼若也不會也許你具一隻眼有箇衲僧出來道總不恁麼時如何對他道切忌向鬼窟裏作活計上堂舉僧問楊岐如何是佛岐云三腳驢子弄蹄行僧云不會岐云湖南長老師云大小楊岐話作兩撅且道薦福為人眼在什麼處久立上堂舉臨濟問僧甚處來僧云定州來濟拈棒僧擬議濟便打僧不肯濟云你已後遇明眼人去在後到三聖遂舉前話三聖拈棒僧擬議聖便打師云臨濟三聖當時若有轉身句後代兒孫未至掃土驀拈拄杖云更有一箇什麼處去也卓一卓下座上堂舉泉大道訪慈明明遂問片雲橫谷口遊人何處來泉左右顧視云夜來何處火燒出古人墳明云未在更道泉遂作虎聲明以坐具打一下泉遂推慈明就坐明却作虎聲泉云某甲參七十餘員善知識今日始遇作家師云二老漢當時若踏著臨濟向上底我等今日飯也無喫還知薦福落處麼驀拈拄杖卓一卓喝一喝下座上堂僧問臨濟有四賓主話如何是賓中賓師云滿眼是埃塵進云如何是主中賓師云腦後薦取進云如何是賓中主師云東行不見西行利進云如何是主中主師云腳下泥深三尺師乃云大通智勝佛十劫坐道場佛法不現前不得成佛道衲僧門下却較些子且和泥合水一句作麼生道一朝權在手看取令行時上堂舉僧問玄沙如何是學人自己沙云是你自己雲門云沒量大人向語脈裏轉却時有僧問如何是學人自己門云忽有人路上請老僧齋你也隨例得飯喫師云玄沙只有殺人刀且無活人劒雲門雖有活人劒且無殺人刀雖然二俱不了落在薦福手裏且如何折合驀拈拄杖卓一卓云輸賦王租了鼓腹唱謳歌上堂舉僧問法眼如何是曹源一滴水法眼云是曹源一滴水師云法眼恁麼説話眼觀東南意在西北忽有人問薦福如何是曹源一滴水只對他道死久立祈雪上堂夜來得一番雪子細思量有五件奇特事應時應節災殃殄滅能除惱熱衆人定疊又見老鴉頭白且道衲僧門下畢竟如何文殊疾走無邊方普賢眼裏重添屑上堂舉德山一日有僧才相看便近前作相撲勢山云你恁麼無禮合喫山僧手中棒僧拂袖出去山云饒你與麼也祇得一半僧轉身便喝山便打云須是我打你始得僧云諸方有明眼人在山云汝天然有眼僧以手擘開眼云貓山云黃河三千年一度清師云者僧是透關底漢若非德山本分鉗鎚幾乎死在句下只如德山道黃河三千年一度清又作麼生嶺梅殘雪後雲鬢未梳時上堂舉龐居士問馬大師不與萬法為侶者是什麼人馬師云待汝一口吸盡西江水即向汝道東山師翁有頌云一口吸盡西江水洛陽牡丹新吐蘃簸土揚塵沒處尋擡頭撞著自家底師云潭州紙貴一狀領過上堂平地上著衣喫飯十箇有五雙不知落處輕如鴻毛重如泰山不必較之達磨西來直指人心見性成佛知他是真是偽衲僧家口似血盆舌如利刀到者裏因什麼口似匾擔東湖借路經過驀拈拄杖云且道尋常在什麼處著到乃擲下云橫身當宇宙一句定綱宗上堂舉昔日師子尊者因𦋺賓國王秉劒於前云師得蘊空否曰已得蘊空曰既得蘊空離生死否曰已離生死曰既離生死就師乞頭得否曰身非我有豈況於頭王便斬之白乳湧高數尺王臂自墮後來玄沙云大小師子尊者頭也不解作得主師云隨氀㲣漢玄覺徵云且道斬著斬不著師云將蝦釣鱉汾陽別云知師不吝師云將錯就錯雪竇云作家君王天然有在師云提水放火翠巖芝云當時祖引頸王舉劒與麼時有人諫得住麼至今無人斷得此公案如今衲僧作麼生斷師云莫要説夢芭蕉云賣寶遇著瞎波斯師云誣人之罪琅瑘云𦋺賓好一口劒爭奈劒上無眼尊者好箇師子且不解返躑師云賊過後張弓復云者一隊漢被山僧勦絶了也還見師子尊者麼驀拈拄杖卓一卓云修身練行恐辱先也因雪上堂即心即佛非心非佛不是心不是佛不是物冷水浸冬瓜大家廝淈𣸩雖然淈𣸩中却有箇分曉處驀拈拄杖云山僧夜來吟得箇山偈舉似大衆雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆忽有箇衲僧出來道長老長老此是雪詩乃對他道冬行春令便下座上堂若作一句商量喫粥喫飯阿誰不會不作一句商量屎坑裏蟲子笑殺闍梨驀拈拄杖云拄杖子罪犯彌天貶向二鐵圍山且道薦福還有過也無卓拄杖也遲一刻上堂舉明招到泉州坦和尚處坦上堂云夫參學一人所在亦須到半人所在亦須到明招便問一人所在即不問如何是半人所在坦無語後令小師問明招明招云汝欲識半人所在麼也只是箇弄泥團漢師云我聞獨眼龍果然只具一隻眼忽有衲僧出來問一人所在即不問如何是半人所在劈脊便棒更問如何是一人所在便與連夜趕出何故一不做二不休
