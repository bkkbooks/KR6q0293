body:
  text: 初住處州妙嚴禪院語録住湖州顯忠資福禪寺門人守詮等編師受請判府左司度疏師拈示衆云此是判府左司兩手分付謂之無盡藏頂王三昧言言見諦句句朝宗若也知得更不重説偈言若也未知輒煩僧官對衆宣讀升座僧問一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途請師速道師云天長地久進云親切已蒙師指示一句無私利有情師云知恩方解報恩進云昨夜清風生八極今朝流水漲前溪師云追風天馬戴麒麟進云非但左司承此善學人禮拜謝師恩師云未放你在僧禮拜師云腳跟下失却師乃云寶劒揮空乾坤失色掀翻是非窠窟截斷生死根株有佛處不得住地久天長無佛處急走過河清海晏三千里外一句全提更無絲毫滲漏堪與佛祖為師作箇人天榜樣正恁麼時轉凡成聖一句作麼生道委悉麼萬古碧潭空界月再三撈摝始應知入院上堂僧問遠離光孝來赴妙嚴如何是不動尊師云一別蓮城五日程進云竹密不妨流水過山高豈礙白雲飛師云老僧不曾動步進云今日得聞於未聞師云急須吐却進云昔日楊岐今朝和尚師云這裏著不得進云爭奈公案現成師云將謂你是箇漢僧云劄師云未在師乃云孤峰萬仞鳥道虗玄名利杳忘是非頓絶直得猿吟古木虎嘯幽巖碧落青霄道人活計雖然恁麼更須知有人境俱奪向上一竅乃竪拂云天上有星皆拱北人間無水不朝東上堂大道只在目前要且目前難覩欲識大道真體不離聲色言語言語動用了無交涉且大道真體在什麼處良久云可憐傅大士處處失樓閣出隊歸上堂透過鐵壁銀山紅塵閙市全彰古佛家風經過酒肆茶坊突出衲僧巴鼻冷笑諸方寒灰枯木坐在無魂必死之地妙嚴有些子神通為汝諸人出氣卓拄杖云三十年弄馬騎却被瞎驢受記又卓一卓下座上堂九年面壁壞却東土兒孫隻履西歸鈍置黃面老子以拄杖劃一劃云石牛欄古路一馬生三寅上堂黃蘗老婆大愚饒舌佛法無多子正眼瞎驢滅驀拈拄杖云妙嚴突出拄杖三人證龜成鱉以拄杖卓一卓云拄杖子善甄別硬却脊梁莫教漏泄觀音菩薩將錢買胡餅放下却是一塊生鐵遂擲下拄杖下座上堂大丈夫須猛烈打破從前伎倆直下斬釘截鐵拈却佛祖機却繫驢橛豈不見睦州為人太親切拶得雲門腳折後來兒孫不辨端倪却向推門處辨別若也恁麼參禪驢年未得休歇妙嚴不惜眉毛與你當頭拈出驀拈拄杖擲下云南贍部洲人常在北單越上堂舉僧問大隋如何是和尚家風隋云赤土畫簸箕僧云如何是赤土畫簸箕隋云簸箕有唇米跳不出師云諸人還知大隋落處麼妙嚴更為頌出簸箕有唇米跳不出天下衲僧赤胳𩪸更須撥轉上頭關十方世界黑似漆以拂子擊禪床下座上堂荊棘林中紅爛破驢脊上蒼蠅韓信臨朝底洞山佛無光者一隊漢朝打三千暮打八百有什麼罪過只如銅沙羅裏滿盛油汝諸人又作麼生良久云大盡三十日小盡二十九上堂舉玄沙問鏡清不見一法是大過患且道不見什麼法清指露柱云莫不是者箇法麼沙云浙中清水白米許你喫若是佛法未夢見在師云鏡清放頑佛祖也不奈何若非玄沙深辨來風幾被露柱吞却有人辨得出妙嚴兩手分付上堂百草頭上罷却干戈萬仞峰前縱橫遊戲暗嗟魯祖面壁一味祇貪瞌睡翻笑睦州見僧與我提一桶水當恁麼時臨濟喝若雷奔也拈放一邊德山棒如撒星亦置之一處妙嚴有一條活路與汝諸人共行遂畫一圓相云東山下左邊底浴佛上堂僧問黃面老子二千年前有一段不了底公案請和尚為他批判師云仰面不見天低頭不見地進云祖禰不了殃及兒孫師云莫謗他好進云既是清淨法身本無出沒因甚年年將惡水潑他師云要他知痛癢進云只如雲門大師道我當時若見一棒打殺與狗子喫却未審具什麼眼目師云盡大地人不知落處進云雲門大師雖則坐斷乾坤爭奈落在釋迦老子圈繢裏師云賊是賊捉師乃云德山拆却佛殿雲門一棒打殺麻三斤殿裏底杖林山下竹筋鞭三遭痛棒九到洞山若作佛法商量爛却舌頭不作佛法商量墮坑落塹到這裏黑漆拄杖有屈無叫處古廟香爐雖冷燒殺闍梨正恁麼時如何武陵春已老臺榭緑陰多上堂拈拄杖云昔白雲端師翁道古人留下一言半句未透時撞著鐵壁相似忽然一日透後方知自己便是鐵壁且道如今作麼生透乃云鐵壁鐵壁師以拄杖卓一卓云鐵壁鐵壁急急如律令勑下座衢州桐山明果禪院語録嗣法門人守詮等編入院開堂拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲次拈香奉為判府中書舍人兩廳通判闔郡文武尊官伏願增崇祿位又拈香云此一瓣香奉為先住宣州彰教後住平江虎丘山雲巖禪院隆和尚爇向爐中用酬法乳之恩一任天下衲僧敲甎打瓦遂斂衣就坐烏巨山雪堂和尚白槌竟師云證第一義諦空名師子吼師子既吼狐狼屏迹異類潛蹤莫有共相出手底麼出來相見僧問德山入門便棒是箇金剛圈臨濟入門便喝是箇金剛圈只如睦州見僧便云擔板漢是箇什麼師云是箇鐵塊子進云忽有箇道是箇栗棘蓬又作麼生師云刺頭入膠盆僧云從前汗馬無人識只要重論蓋代功師云九九八十一師乃云善言言者言所不能言善迹迹者迹所不能迹言迹既盡猶是就理變通向衲僧門下未足觀光是故從上佛祖提持正印密付要旨若不具別緇素大眼目如何跂及豈不見世尊在菩提樹下明星現時成等正覺爾時大地衆生同得同證於四十九年曲盡老婆心末後向百萬大衆前拈花獨有迦葉微笑便云吾有正法眼藏涅槃妙心分付摩訶大迦葉敢問諸人且道有分付無分付若道有分付則埋沒迦葉師兄若道無分付則辜負釋迦老子這裏若涇渭不分則靈山付囑遂為虗設正當恁麼時還有人道得麼若也道得明果價增十倍苟或未然雪後始知松柏操事難方見丈夫心復舉保壽開堂三聖推出一僧保壽便打三聖云與麼為人瞎却鎮州一城人眼去在保壽擲下拄杖歸方丈師云叢林中商量盡道保壽三聖是作家爐鞴本分鉗鎚有什麼交涉殊不知二老被這僧一拶直至而今扶不起今日莫有為二老雪屈底麼出來與明果相見有麼驀拈拄杖擲下云龍蛇易辨衲子難瞞上堂舉米胡令僧問仰山今時人還假悟也無山云悟則不無爭奈落在第二頭其僧回舉似米胡胡深肯之師云米胡提本分鉗鎚仰山展劒刃上事二老於唱教門中足可稱尊若向衲僧門下總是喫棒底漢上堂九九九釋迦老子不知有翻轉面皮伸出毛手握金剛鎚碎窠臼突出無位真人一一面南看北斗下座浴佛上堂釋迦老子初生下時一手指天一手指地天上天下唯我獨尊後來雲門道我當時若見一棒打殺與狗子喫貴圖天下太平師云雲門此話雖行未免落他陷穽黃面老子末上賣峭正是附草附木二俱不了以左手拍禪床云過這邊著汝諸人還見明果落處麼珊瑚枕上兩行淚半是思君半恨君上堂僧問大慧禪師道無之一字是斷生死刀子還端的也無師云恁麼説話未夢見趙州在進云忽有人問和尚狗子還有佛性也無未審如何師云無僧禮拜乃舉僧問雲門不起一念還有過也無門云須彌山師云雲門道得不妨諦當要且落在第二頭若時明果即不然忽有人問不起一念還有過也無只對他道致將一問來聖節上堂聖諦第一義高而無上廣不可極淵而無下深不可測乾坤依此而覆載日月依此而照臨虗空依此而寬廣萬靈依此而變通故我林下道人依此學無為法悟無生忍且道報恩一句作麼生道一爐沉水一聲佛仰祝吾皇億萬年韓太尉入山上堂舉朱行軍入南際寺齊僧執手爐行香乃云直下是直下是時有僧云直下是什麼行軍便偈僧云行軍是佛法中人惡發作麼行軍云你作惡發會那僧便喝行軍亦喝云鈎在不疑之地遂呼左右認取者僧著師云行軍拈出倚天長劒者僧披襟敢衝雪刃雖然兩不相傷爭奈二俱弄險今日承宣太尉入山齋僧雖無如是問答須知此話已行此話既行且道説箇什麼臥龍才奮迅丹鳳亦翱翔上堂三世諸佛眼裏無筋六代祖師皮下無血明果咬定牙關𨁝跳也出他圈繢不得何故南泉斬貓兒上堂千溪水冷萬壑雲寒無位真人乾屎橛金剛寶劒破牢關多年曆日最靈驗百尺竿頭子細看瞎却眼啞却口無孔鐵鎚成隊走且腦後一句是第幾機喝一喝云耶舍塔中敲鐵磬天台鴈蕩絶人行復舉趙州訪茱萸至法堂上從東過西從西過東萸云作什麼州云探水萸云我者裏一滴也無探箇什麼州以杖靠壁而出師云茱萸一滴也無滔天白浪趙州以杖靠壁不犯波瀾雖然二老同死同生爭奈明果未肯放過在上堂舉南院示衆云赤肉團上壁立萬仞有僧出云赤肉團上壁玄萬仞豈不是和尚語院云是僧便掀倒禪床院云者瞎漢便打師云也是勾賊破家若非者僧敢捋虎鬚爭見南院汗馬功高雖然明果更資一路赤肉團上壁立萬仞若有僧出劈脊便打何故殺人刀活人劒具眼者看上堂少室巖上風吹石裂大徹堂前冷灰豆𪹼大丈夫漢一刀兩斷驀拈拄杖云汝諸人還知明果拄杖麼良久卓一卓云龍得水時添意氣虎逢山色長威獰上堂舉修山主頌云二破不成一一法鎮長存若作一二會永劫受沉淪師云坐殺修山主也直饒不作一二會不免入驢胎馬腹是汝諸人十二時中行住坐臥還知放身命處麼豈不見道不是河南便河北喝一喝下座上堂舉睦州問僧近離甚處僧便喝州云老僧被你一喝僧又喝州云三喝四喝後如何僧無語州便打者掠虗漢師云叢林中商量道待他道三喝四喝後如何便與掀倒禪床不然拽坐具劈口摵不然拂袖便行不然更與一喝恁麼説話要稱為達磨兒孫大遠在漆桶參堂去下座上堂舉僧問雲門殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔雲門云露師云雲門露猛如虎達磨師不是祖豈不見鹽官老須彌為槌虗空為鼓又不見禾山老解打鼓休莽鹵甜瓜徹蒂甜苦瓠連根苦喝一喝下座烏巨山雪堂和尚到上堂云臨濟三遭痛棒高安灘上知歸興化於大覺棒頭深明黃蘗意旨山中兄弟雖然不多各各病在膏肓若非師叔和尚到來明果豈敢妄通消息少間下座與諸知事頭首大衆同伸拜請伏望慈悲痛垂發藥上堂萬里無寸草青天轟霹𮦷十字街頭癡漢棒打不死釣魚船上謝三郎一向賣峭有句無句如藤倚樹樹倒藤枯溈山呵呵大笑且道明什麼邊事禹力不到處河聲流向西上堂僧問虗空消殞時如何師云離婁行處浪滔天復舉雪峰巖頭欽山參德山欽山問天皇也漝麼道龍潭也漝麼道未審和尚作麼生道德山云汝試舉天皇龍潭底看欽山擬議德山便打欽山被打歸延壽堂云是即是打我太煞巖頭云你恁麼他後不得道見德山雪竇拈云欽山置箇問端甚是奇特爭奈龍頭蛇尾汝試舉天皇龍潭底看坐具便𢷾大丈夫漢捋虎鬚也是本分他既不能德山令行一半若盡令行雪峰巖頭總是涅槃堂裏漢師云宗師非具透關眼有格外機臨垂手之際又焉能辨其緇素只如德山令行一半雪竇還免得也無既不能免當時若從德山門下過也是喫棒底漢驀拈拄杖云還見德山麼乃卓一卓云賊是小人月旦上堂召大衆云三日前五日後若不揮劒漁父栖巢明果有一轉語也要諸人共知犀因玩月紋生角象被雷驚花入牙下座蘄州德章安國禪院語録嗣法門人守詮等編入院上堂僧問機不離位用處停機即不問未審萬機不到處如何通信師云一舉四十九進云坐斷十方去也師云你要啞却老僧口那進云和尚是什麼心行師云你也是什麼心行進云只這裏還著者一句子得麼師云著得千句萬句進云只如萬機不到處作麼生行李師云萬機不到處七穿八穴進云爭奈淨裸裸無依赤灑灑全露師云是上座得力處進云只如僧問香嚴不慕諸聖不重己靈時如何香嚴道萬機休罷千聖不携疏山具什麼眼腦不肯香嚴師云闍梨納敗愈甚進云肯諾不得全還明得香嚴意也無師云爛却你舌頭進云肯則肯他諸聖諾即諾自己靈香嚴不肯疏山又如何話會師云平地上喫交進云疏山後問鏡清肯諾不得全道者合作麼生清云全歸肯諾此理如何師云失却拄杖子僧提起坐具云爭奈者箇何師云錯認定盤星進云疏山道不得全又作麼生清云箇中無肯路還得𡎺頂𡎺底也無師云腦後見腮進云學人肯不存諾不立時如何師云草裏輥進云任從天上輥不向地中埋師云却較些子僧禮拜師云得箇驢兒便喜歡師乃拈拄杖云三世諸佛也與麼六代祖師也與麼天下老和尚也與麼章山更與諸人為蛇畫足卓一卓云萬機俱寢削一箭中紅心復舉夾山會下有一僧到高亭才禮拜亭便劈脊打僧云和尚莫打某甲又禮拜亭又打趕出其僧舉似夾山山云會麼僧云不會山云賴汝不會汝若會即夾山口啞去師云高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是箇漢莫道高亭夾山便是達磨出來也斬為三段何故家肥生孝子國霸有謀臣上堂云少室峰前漆桶話墮曹溪路上賺殺闍梨是汝諸人還曾夢見也未豈不見道千年田八百主蟭螟蟲吞却虎復舉臨濟問院主什麼處去來主云州中糶黃米來濟以拄杖劃一劃云還糶得者箇麼主便喝濟便打次典座至濟舉似典座座云院主不會和尚意濟以柱杖劃一劃云你又作麼生座禮拜濟又打黃龍南禪師拈云院主下喝不可放過典座禮拜放過不可臨濟令行歸宗放過三十年後有人説破大溈和尚拈云院主下喝典座禮拜臨濟令行古今獨邁師云二老漢雖力荷綱宗檢點來未免依草附木殊不知大小臨濟被者兩箇漢破家散宅還會麼殺人刀活人劒上堂舉芙蓉和尚初參歸宗問如何是佛宗云我向你道你還信否芙蓉云和尚誠言焉敢不信宗云即汝是曰如何保任宗云一翳在眼空花亂墜法眼拈云歸宗若無後語有什麼歸宗也法眼與麼道正是盲人摸象乃拈拄杖云汝等諸人要見章山為人處麼擲下云三十年後上堂舉僧問仰山法身還解説法否山云我説不得別有一人説得僧云即今在什麼處山乃推出枕子示之溈山云寂子用劒刃上事師云若是劒刃上事仰山何曾會用忽有箇衲僧出來問章山法身還解説法否也只向他道我説不得別有一人説得又問説得底人在什麼處只對他道三生六十劫上堂舉僧問百丈如何是奇特事丈云獨坐大雄峯僧禮拜丈便打師云大小百丈答話不了上堂舉六祖受道之後過法性寺坐廊廡間暮夜風揚剎幡二僧對論一云風動一云幡動往復不已六祖曰可容俗流輒預高論否二僧曰願聞其義祖曰不是風動不是幡動仁者心動師拈云一盲引衆盲相牽入火坑上堂德章老瞎禿從來沒滋味拈得口失却鼻三更二點唱巴歌無端驚起梵王睡喝一喝云我行荒草裏汝又入深村
