body:
  text: 建康府蔣山太平興國禪寺語録嗣法門人守詮等編師入寺開堂拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲次拈香云此一瓣香奉為判府安撫留守端明尚書暨闔府勳貴同資祿算又拈香云奉為前住平江府虎丘山隆和尚用酬法乳之恩遂斂衣就坐保寧和尚白槌云法筵龍象衆當觀第一義師云若論第一義如紅爐上一點雪相似若也聽不出聲見不超色何妨出衆決疑僧問古釋迦不先新彌勒不後正當今日佛法委付蔣山未審千聖不借底機如何舉唱師云直下薦取僧云恁麼則控佛祖大機廓人天正眼師云穿天下衲僧鼻孔僧云一句逈超今古格萬年仰祝聖明君師云滿口道著僧云祇如不借底機如何分付師云腦後看僧云銅頭鐵額如龍虎看取金圈栗棘蓬師云正是老僧用底僧云靈山會上世尊拈花迦葉微笑未審此意如何師云一人傳虗萬人傳實僧云世尊道吾有正法眼藏分付摩訶大迦葉又作麼生師云聽事不真喚鍾作甕僧云靈山拈花分付正法眼藏蔣山今日開堂有何垂示師云還見麼僧云今日一會不異靈山師云更出他一頭地僧云有意氣時添意氣不風流處也風流師云救得一半師乃云金剛正體融攝十虗透頂透底絶羅籠亘古亘今無向背不是心不是佛不是物當頭坐斷千眼頓開天地以此和氣萬象以此發輝諸佛以此出世祖師以此西來衲僧以此闢選佛場啓大爐鞴拈本分鉗鎚碎邪師窠臼於其中間一箇半箇按下雲頭一旦知非洞明生佛已前一段大事不在一剎那間頓入不思議大解脫門所謂大丈夫成就大丈夫事是故靈山會上廣額屠兒放下屠刀云我是千佛一數大集會中大力魔王云待一切衆生悉皆成佛了衆生界空然後發菩提心豈不是龍馳虎驟香象渡河又如師子筋琴撫之則群音頓絶到這裏上無攀仰下絶己躬常光現前壁立萬仞德山有棒無下手處臨濟有喝無開口分至於天下老和尚據曲彔木敲床竪拂瞬目揚眉指東劃西鼓脣搖舌亦未免依草附木雖然一向恁麼去何止法堂草深一丈有條攀條無條攀例豈不見天親菩薩從彌勒內宮下無著菩薩問云人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審說什麼法天親云說這箇法唯是梵音清雅令人樂聞看他過量人提持過量事於過量境界中發過量機顯過量用不妨頭正尾正直得堯風蕩蕩舜日高明野老嘔歌漁人鼓舞當此之時畢竟承誰恩力紫煙籠帝闕瑞氣繞天津上堂道不得底句不在天台定在南嶽驀拈拄杖云是汝諸人還見蔣山拄杖麼卓一卓云人貧智短馬瘦毛長上堂舉僧問趙州夜升兜率晝降閻浮為甚摩尼珠不現州云道什麼僧擬進語州云毗婆尸佛早留心直至如今不得妙師云這一則公案諸方未曾有批判者蔣山今日為諸人著一轉語洗腳上船焚衆僧髮拈火把云一呼善來鬚髮自落積纍既多無處安著普請大衆把火燒却且道燒却後如何不用撥灰求舍利無邊頂相放毫光開爐上堂三世諸佛吞却火焰火焰燒殺三世諸佛一盲引衆盲相牽入火坑棒打不碎底填溝塞壑刀斫不入底臥雪眠霜作世諦商量也得作佛法流布也得渾崙吞却三十年後有人索飯錢在直饒爛嚼白湯咽下未免黏牙帶齒且道蔣山為人在什麼處爛研巴豆三千顆瀉却諸方五味禪元正上堂元正啓祚更無回互萬物咸新截鐵斬釘應時納祐跳出窠臼孟春猶寒言端語端知事頭首各各希有雲堂大衆雍容鄭重蔣山恁麼說話且道在裏許不在裏許若在裏許未免是箇流俗阿師不在裏許又著在什麼處所以道世人住處我不住世人行處我不行不是與人難共住大都緇素要分明上堂舉教中道從聞思修入三摩地師云思是聞之本聞是思之用且道作麼生說箇入底道理青原白家三盞酒喫了猶道未沾脣上堂云道遠乎哉觸事而真善因招惡果聖遠乎哉體之即神刻糞作旃檀蔣山恁麼著語是汝諸人還知落處麼良久云不因風撼庭前樹爭見山花入袖香長蘆到上堂風行草偃水到渠成夙世冤家同門出入聞禪聞道似鴨聽雷見佛見祖如風過樹隔江見剎竿便回去腳跟下好與三十棒未足觀光直須眉毛廝結同生同死且道五逆聞雷一句作麼生道良久云上大人丘乙己佛生日上堂云鐵壁鐵壁從來真實號之曰佛常在苦海中立風吹不入水灑不濕棒打不入是故以本願力撈摝衆生不息雲門忍俊不禁打與狗喫此意深密非語默可及四月八日是渠誕迹露柱燒香湯已畢大家送至龕室泥人揩背一拶骨出忽然怒發打瞎頂門一隻直至而今叫屈屈屈屈堪述休相憶清風匝地有何極咄咄咄上堂云趙州喫茶我也怕他若非債主便是冤家倚墻靠壁成群隊不知誰解辨龍蛇聖節上堂云天上無雙日閻浮一至尊萬年松不老聖壽等乾坤普請栽松上堂舉臨濟在黃蘗栽松次蘗云深山裏栽許多松作什麼濟云一與山門作境致二與後人作標榜道了以钁打地三下蘗云雖然如是子已喫吾三十棒了也濟又打地三下作噓噓聲蘗云吾宗到汝大興於世溈山問仰山黃蘗當時祇囑臨濟一人別更有在仰云有祇是年代深遠不欲舉似和尚溈云雖然如是吾也要知但舉看仰云有一人指南吳越令行遇大風即止師云黃蘗道雖然如是子已喫吾三十棒了也養子之緣故當如是臨濟正令雖行可惜向钁頭邊甘自活埋仰山見解未出常流豈止遇大風即止當時何不道直待虗空界盡此話方始大行豈不是頭正尾正蔣山今日捋下面皮要與諸人相見去也驀拈拄杖卓一卓云驚群須是英靈漢敵勝還他師子兒上堂云十五日已前半暗半明十五日已後半明半暗正當十五日面如滿月目如蓮天上人間咸恭敬桑樹著箭柳樹汁出若論佛法兩字謝三娘賣銀徑山大慧禪師至上堂僧問昔日法華到琅瑘二俱提向上機顯奇特事今日徑山象駕光臨未審如何相見師云漆桶相揩進云通人分上觸處相逢師云切忌恁麼會進云非唯和尚親見親聞學人一衆小出大遇師云一切墮坑落塹進云直得古風來不絶仰觀佛日正高輝師云滿口道著進云心不是佛智不是道又作麼生師云掘地深埋進云還有承當處也無師云切忌承當進云棒打石人頭剝剝論實事師云如何是實事僧云向下文長師云速禮三拜僧云謝師答話師乃云我本無心有所希求今此法王大寶自然而至法王大寶既至汝等諸人急著精彩所謂見之不取思之千里豈不見大隋和尚道我參七十餘員善知識具大眼目底祇有一二其他盡具正知見在今天下具大眼目真善知識唯法叔老師一人而已黑漆竹篦掀翻海嶽從頭打過雖是死馬醫就中要妙黃蘗打臨濟拄杖蔣山豈是無耶蓋為土曠人稀雲門一曲臘月二十五那在今朝十六日吹唱驀拈拄杖卓一卓云虗空可量風可繫無能盡說佛功德復舉頃在虎丘聞先師舉佛眼叔祖初作無為軍化士因道中著攧有箇省處歸來舉似師祖後令充知客因夜坐撥火忽然猛省雖然如是每至入室未能深入閫奧從容請益大師祖云我為你說箇喻子正如一人牽一頭牛從窗櫺中過兩角四諦悉皆過了唯尾巴過不得師云這箇說話多年在肚皮裏信知在今天下無人理會得所以密之三寸苟非法叔老師到來小姪此生無因拈出敢問諸人既是大底過了如何尾巴却過不得且道誵訛在什麼處小姪今日對衆拈出供養我法叔老師大和尚惟願壽與趙州同年為佛法作大主張使天下衲僧洞徹此一段奇特大事下座同知事頭首大衆殷勤拜請伏望慈悲俯垂開示隆報覺長老受請上堂云無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃驀拈拄杖卓一卓云普請向者裏入聞聲悟道見色明心觀音菩薩將錢買胡餅放下元來是個謾頭又拈拄杖卓一卓云若向這裏入瞎却人眼不向這裏入又向什麼處入刢利漢一撥便轉更須知有出身一路敢問大衆作麼生是出身一路又卓一卓云舉頭天外看誰是我般人上元日上堂去年無此雪今年有此雪人皆怨此雪不見元霄燈與月莫怨雪自是時人無辨別堪辨別一片清光倚寥沈上堂舉僧問多福如何是多福一叢竹福云一莖兩莖斜僧云學人不會福云三莖四莖曲師因成一頌一莖兩莖斜其意毒如蛇三莖四莖曲無疑入地獄言下若知非心空及第歸堪笑蔣山老無端入荒草聖節上堂云時康道泰天清地寧一人端拱無為萬物各得其所普天率土無不承恩航海梯山均蒙雨露釋迦彌勒共樂升平文殊普賢咸揚正化塵塵剎剎普現威光物物頭頭全彰正眼且道報恩一句作麼生道祇將一味無求法仰祝天申億萬年端午上堂一二三四五五四三二一從頭點檢來笑殺維摩詰帶纍李胡子噴水髭鬚濕灑淨已周圓次念波羅蜜蔣山恁麼道千古誰人識識不識何處覔堪與叢林為軌則驀拈拄杖卓一卓云急急如律令勑上堂泥多佛大水長船高直饒說得道理分明也須親到一遭敢問諸人且道親到後如何有理不在高聲便下座上堂舉西堂正法和尚立僧云西天四七唐土二三天下老和尚無不以此頂𩕳上一著流通正法眼藏顯示涅槃妙心是故雲夢之竹天下之徑也然而不矯揉不羽筈則不能以入堅堂溪之金天下之利也然而不鎔範不砥礪則不能以擊強矯揉羽筈鎔範砥礪既妙至人之用其赤手提持解黏去縛抽釘拔楔烹佛煅轉凡成聖亦不出此箇端由所謂善知識者是大因緣其斯之謂歟正當恁麼時如何竚看汗血八駿駒何啻日馳三萬里王機宜為弟樞密相公散水陸請升座師示衆云大人具大見大智得大用升大解脫堂演大解脫義是故留守樞密大資相公雖示世人有去有來極其本體不動不變所以羅籠不肯住呼喚不回頭佛祖不安排至今無處所塵塵剎剎普現威光物物頭頭全彰勝相殊勝中殊勝奇特中奇特他方此界全心淨土人間天上同一真境正當恁麼時且道留守樞密大資相公即今在什麼處手提殺活金剛劒誰敢當頭正眼看上堂云千說萬說不如親見把手共行略通一線打破漆桶何曾見面阿耨多羅三藐三菩提也是靈驗蔣山恁麼做頌驢年也未夢見便下座上堂云金佛不度爐木佛不度火泥佛不度水真佛屋裏坐萬牛挽不回千箇與萬箇好事積如山祇緣輕放過不放過今日鍾山甘話墮上堂舉遵布衲問韶山明鏡當臺請師一鑑韶云不鑑云為什麼不鑑韶云破鏡不重照落花難上枝遵無語韶便打死心和尚云這般漢打得百千萬箇有甚罪過當時若在黃龍手裏棒折也未住在師云死心和尚一期大驚小怪殊不知韶山自遭遵布衲毒手之後至今無人檢點得出且道誵訛在什麼處謝知事頭首上堂僧問法印咨和尚教中道譬如暗中寶無燈不能見佛法無人說雖慧不能了請師說法師云寶印當空妙重重錦縫開進云與麼則大衆霑恩人天有賴師云墮坑落塹進云和尚慣用此機師云熟處難忘問記得翠巖夏末示衆云一夏與兄弟東說西話看翠巖眉毛在麼未審意旨如何師云翠巖輸己算人進云保福道作賊人心虗還契他翠巖意麼師云賊還賊捉進云長慶道生也又作麼生師云腳頭腳尾進云雲門云關此意又作麼生師云喪身失命進云還許學人露箇消息也無師云又且何妨進云四老共栽無影樹乾坤大地作陰凉師云你祇道得一半僧禮拜師乃云大丈夫漢脊梁硬如鐵在乎進退之間初無喜難之色其退也古寺間房焚香清坐究竟乃新報佛恩德其進也公於心明賞罰使紀綱不墜表帥得人各應其宜然後據虎頭收虎尾第一句下明宗旨蔣山雖然痛下毒手全身擔荷要在當人正恁麼時且道不失其序一句作麼生道玲瓏八面活鱍鱍千古萬古振嘉聲上堂舉米胡問僧近離甚處僧云藥山米胡云藥山老人近日如何僧云大似一片頑石相似胡云得恁麼鄭重僧云也無提掇處胡云非但藥山老僧亦恁麼僧近前顧視而立胡云看看頑石動也其僧便出師云這僧豈是不具眼叵耐却將藥山一片頑石到處賣弄苟非米胡深辨端倪幾遭惑亂是你諸人試辨看上堂拈拄杖卓一卓喝一喝云德山臨濟來也是汝諸人且莫錯認定盤星所以道爐鞴之所鈍鐵尤多良醫之門病者愈甚有般漢便道且莫壓良為賤然當爐不避火迸忠言不避截舌且道蔣山到這裏如何風動心搖樹雲生性起塵以拄杖卓一卓下座上堂舉僧問長沙云如何轉得山河國土歸自己去沙云如何轉得自己成山河國土去僧云不會沙云湖南城裏好養民米賤柴多足四鄰僧無語沙有頌云誰問山河轉山河轉向誰圓通無兩畔法性本無歸師云蔣山隨分判斷大小長沙勘這僧不破上堂舉洞山問講維摩經座主云不可以智知不可以識識是什麼語主云是贊法身語山云法身是贊何用更贊主無語師云且道諸人向這裏下得什麼語蔣山今日也要出一隻手又恐諸人穿却鼻孔上堂萬里長城不在一人之力千鈞之弩要為群胡發機可謂寰中天子勑塞外將軍令一處中千處萬處一時中一處透千處萬處一時透一處明千處萬處一時明不消一彈指頃掃清魔壘獨步大方正當與麼時如何鵰弓已挂狼煙息萬里歌謠賀太平平江府報恩光孝禪寺語録嗣法門人守詮等編師入方丈據坐云大衆此室深廣晝夜常放金色光明是文殊大人境界又謂之縵天網子透得過底腦後也與一槌透不過底便好丹霄獨步何故殺人須見血為人須為徹上堂云當頭坐斷千眼頓開一句投機十方通暢以無邊虗空為正體以微塵剎海為妙用以清淨莊嚴攝懈怠以精進行願警昏迷雖然如是若也以為究竟向衲僧門下天地懸殊若也把斷要津於勞生界中未為好手祇如二途不涉如何通信諸人還會麼禪月尊者用盡神通毗耶老人願海尤大因緣時節既非偶然竹杖芒鞋今日親到殿堂修廣樓閣洞開百萬家和氣靄然恆河沙諸佛圍繞光孝堂前坐見鹽梅霖雨姑蘇臺上行看玉樹花開無量殊勝併集解脫知見普熏且道恁麼時畢竟功歸何所良久云頂門正眼分緇素天上人間不可陪復舉裴相國因入大安寺見壁間高僧𦘕像乃問主僧真容可觀高僧何在主僧無語相國云此間莫有禪僧麼主僧云近有僧至疑是禪僧相國召至乃理前話禪僧云請相公垂問相國云真容可觀高僧何在禪僧召相公相國應喏僧云高僧何在相國言下大悟禪者乃黃蘗斷際禪師是也大衆黃蘗布縵天網要打衝浪錦鱗裴相國坐籌帷幄不妨決勝千里諸人若也於此見得倜儻分明可謂今之古之苟或未然三尺龍泉光照膽萬人叢裏奪高標小參僧問臨濟住院普化盡力扶持萬壽堂前學人單刀直入時如何師云正要恁麼人僧云旃檀林裏旃檀師子窟中師子師云汝試作師子吼看僧噓一聲師云正是野犴鳴僧又噓一聲師云見怪不怪僧云爭奈哮吼一聲名振天下師云大衆笑你僧云笑我者是我同參便禮拜師乃云師子吼無畏說百獸聞之皆腦裂香象奔波失却威龍天寂聽生欣悅若喚作師子吼未具衲僧眼在不喚作師子吼衲僧眼在什麼處大丈夫漢直下一刀兩段更說什麼祖師西來直指人心見性成佛更說什麼即心即佛非心非佛不是心不是佛不是物光孝與麼大似掉棒打月諸人還見光孝撒手處麼直饒見得徹未入光孝門在直饒入得光孝門未升光孝堂在直饒升得光孝堂未入光孝室在直饒入得光孝室未見光孝在設有恁麼人出來便好痛與一頓何故識法者懼復舉法燈和尚云本欲深藏巖壑隱遁過時奈緣清凉老人有未了底公案出來為他了却時有僧出云如何是未了底公案法燈便打云祖禰不了殃及兒孫僧云過在什麼處燈云過在汝辜負我師云法燈是即是據虎頭收虎尾檢點將來忒煞藞苴老僧本志亦然正緣虎丘先師有未了底公案今日出來為他了却其間設有一箇半箇為衆竭力全身擔荷光孝也不打汝也不罵汝也不趕汝祇要汝漆桶子驀地脫去且道了不了不見道了了了時無可了玄玄玄處亦須呵上堂舉雲門大師到乾峰云請師答話峰云到老僧也未門云恁麼那恁麼那峰云將謂猴白更有猴黑師云二老宿一等相見就中奇特光孝今日為諸人說道理一遍將謂春歸無覔處不知還入此中來悲濟會水陸升堂僧問悲濟會啓蓮社莚開自利利他冤親平等學人上來擬伸一問時如何師云老僧答你了也進云前三三後三三是多少師云填溝塞壑進云今日一會果不虗設師云應時應節僧云謝師答話師召大衆云大智洞明體無去住明逾日月寬若太虗天地以此為覆載日月以此為照臨山嶽以此為崔嵬江河以此為流注賢聖以此為威靈凡夫以此為安養陳亡以此為超升冤讎以此為解脫諸佛以此為示現祖師以此為單傳諸人以此為悲濟光孝以此為方便驀拈拄杖云釋迦老子祇今在山僧拄杖頭上放大光明其光清淨無壞無雜光光相羅前後無別塵塵普入剎剎全彰然後無量為一一為無量大中現小小中現大於一毫端現寶王剎坐微塵裏轉大法輪且道諸人向什麼處見釋迦老子若向拄杖頭上見未見在若向妙法蓮華中見亦未見在既不如是畢竟向什麼處見釋迦老子以拄杖卓一卓云願今得果成寶王還度如是恆沙衆上堂云靈雲見桃花悟道玄沙云諦當甚諦當敢保老兄未徹在雲峰云備頭陀何不遍參去玄沙云達磨不來東土二祖不往西天師云百鳥不來花又老不知誰是到庵人上堂舉臨濟與普化一日同往施主家齊濟問毛吞巨海芥納須彌為復神通妙用法爾如然化躍倒飯床濟云太粗生化云這裏是什麼所在說粗說細濟來日又同一施主家齊濟復問今日供養何似昨日化又躍倒飯床濟云太粗生化云瞎漢佛法說什麼粗細濟乃吐舌師云一出一沒一往一來猛虎口裏奪餐毒蛇頭上揩癢要且未稱大丈夫事在二老名喧寰宇價重當時光孝今日豈可謹密三寸二俱放過為它弄假像真二俱不放過為它榼𣜂太甚是汝諸人若作佛法商量達磨一宗掃土而盡上堂舉僧問興化四方八面來時如何化云打中間底僧禮拜化云大衆興化昨日赴箇村齊回至中路值一陳狂風暴雨却去古廟裏避得過師云我見燈明佛本光瑞如此上堂云千年田八百主甜瓜徹蒂甜苦瓠連根苦君不見禾山解打鼓又不見採菊東籬下千山萬山疊疊高門戶又不見光孝僧堂六七間日日普請搬泥土又不見臨濟主中賓賓中主二三四七面相覩報禪流莫莽鹵聞普請歡喜攙先去去去實不去途中好善為來來實不來路上莫虧危又不見主中主箇箇衲僧氣如虎光孝恁麼告報且道落在什麼處以拂子擊禪床下座授天童請上堂去年十一月笑別下鍾阜今年九月中行見朝天路去住既無心動靜非取與平生安樂法此意同誰語四明昔嘗到諸剎皆可數山川氣象雄麟鳳棲遲處今思昔日遊歲月二紀許豈謂臨晚景侯伯重相顧開緘讀來書丁寧見毫楮姑蘇二千石眼高照天宇我昔昧平生今見開心腑欣然樂與行方鳴集衆鼓先師未了底今日應須去敢問諸人如何是先師未了底驀拈拄杖卓一卓喝一喝下座
