body:
  text: 婺州寶林禪寺語錄嗣法門人守詮等編師受請僧問三聖道我逢人則出出則不為人意旨如何師云斬釘截鐵進云興化道我逢人則不出出則便為人又作麼生師云隨邪逐惡進云恁麼則一點水墨兩處成龍師云不是恁麼師乃云孤峰頂上聳壑昂霄好不資一毫十字街頭和泥合水醜不資一毫如是則在彼在此同得同用所以道我此法印為欲利益世間故說在所游方勿妄宣傳到箇裏推倒須彌飲乾大海於其中間出沒卷舒了無妨礙且應緣利物一句作麼生道雪後始知松栢操事難方見丈夫心當晚小參僧問未離兜率已降王宮未出母胎度人已畢此意如何師云一人傳虗萬人傳實進云為復是神通妙用法爾如然師云一刀兩段進云金鷄破琉璃殻玉兔挨開碧海門師云猶欠一半在問彌勒真彌勒分身千百億時時示世人世人皆不識如何是彌勒師云是甚乾屎橛進云若然者頭頭垂示處子細好生觀師云你無佛性觀作什麼僧禮拜師乃云彌勒真彌勒分身千百億時時示時人時人俱不識這老漢四稜榻地了也是汝諸人還識得也未若識得正是眼中添屑若不識寶林有過便下座上堂云達磨西來直指人心見性成佛者老臊胡當時若知有轉身句是你諸人未免橫屍露骨且道寶林恁麼告報還有地頭也無莫守寒巖異草青坐著白雲宗不妙謝知事上堂一喝分賓主照用一時行要會箇中意日午打三更祇如一喝未施已前還有賓主也無既分之後那箇是賓那箇是主者裏緇素得出賓則始終賓主則始終主祇如賓不是賓主不是主且一喝落在什麼處橫按鏌鎁全正令太平寰宇斬癡頑上堂云佛祖正印衲僧藞苴有眼如盲有口如啞更問如何可知禮也上堂舉興化見同參來纔上法堂化便喝僧亦喝化又喝僧復喝化近前拈棒僧又喝化云你看者瞎漢猶作主在僧擬議化直打出法堂侍僧問適來僧有何相觸忤化云是佗適來也有權也有實也有照也有用我將手向伊面前橫兩遭到這裏去不得似者般瞎漢不打更待何時師云興化門墻千仞從來家法森嚴這僧暗透重關要看洞中春色好則好未免二俱失利祇如興化道我將手向伊面前橫兩遭又作麼生天堂未就地獄先成上堂舉安國挺禪師因僧問五祖真性緣起其義云何祖默然時挺禪師侍次乃謂大德正興一念時是真性中緣起其僧言下大悟師云五祖不合默然好與二十棒挺禪師不合道大德正興一念時是真性中緣起也與二十棒其僧言下不合大悟也與二十棒且道寶林還有過也無也與二十棒上堂舉龐居士一日賣笟籬撲倒在地靈照便去身邊臥士云作麼照云見爺倒地特來相扶師云居士倒地靈照扶起乞兒伎倆討甚巴鼻擊禪床下座上堂盡乾坤大地撮來無一絲毫許你諸人向甚處安身立命直饒倜儻分明去未免無繩自縛且道寶林恁麼還有著力處也無啼得血流無用處不如緘口過殘春上堂僧問楊岐問慈明幽鳥語喃喃辭雲入亂峯時如何明云我行荒草裏汝又入深林此意如何師云兩箇漆桶失却鼻孔進云是什麼人収得師云是上座進云爭柰不亂拈出師云賊身已露進云祇如楊岐道官不容針更借一問慈明便喝還有為人處也無師云無為人處進云許多葛藤向甚麼處著師云虗空裏著進云虗空無壁落四面亦無門作麼生著師云恰好進云楊岐亦喝慈明又喝意作麼生師云平地喫交進云爭柰楊岐一拳還一拳一趯還一趯師云莫謗楊岐好進云見成公案師云何不拈出僧便喝師云有甚交涉師乃云心不是佛智不是道量才補職捨重從輕二百個衲僧一百九十九箇匙挑不上且道那一箇著在甚麼處瞎漢歸堂去冬至上堂君子道長小人道消衲僧活計不在兩頭有般癡漢便問未審在什麼處似者般底不打更待何時且道寶林恁麼道還有過也無試定當看上堂舉僧問智門如何是般若體門云蚌含明月僧云如何是般若用門云兔子懷胎死心和尚拈云如何是般若體一堆屎如何是般若用屎堆裏虫師云兩箇漆桶一時話墮了更添一枚如何是般若體相見便無禮如何是般若用從來愛打閧且道三箇漆桶還有優劣也無若檢點得出許你具頂門眼退院上堂祖師心印狀似鐵牛之機去即印住住即印破有般漆桶便向不去不住處坐地無異蚊蚋以足欲探滄溟之深淺其可得乎豈不見古人道世人住處我不住世人行處我不行不是與人難共住大都緇素要分明祇如死心和尚一日挾火示僧云若喚作火燒殺你不喚作火凍殺你是你諸人還緇素得出麼苟或未然珍重五湖雲水客笑看千嶂起風雷婺州報恩光孝禪寺語錄嗣法門人守詮等編入院上堂僧問祇者是埋沒自己祇者不是辜負先聖去此二途和泥合水處請師道師云玉筯撑虎口進云一言金石譚來重萬事鴻毛脫去輕師云莫瞞老僧好進云和尚得恁麼絮那師云你莫作絮會進云爭柰步步相隨言言見諦師云却是你絮師乃云古佛家風遇古佛然後拈出大人境界見大人乃可顯揚今日朝斾臨筵人天普集古佛家風既展大人境界全彰揭示摩醯正眼洞明少室真機頓契佛祖不傳妙心開悟父母未生面目直下斬釘截鐵猶是把放船苟若說心說性未免和泥合水這條通天活路千聖共行萬靈同轍淨躶躶沒虗空赤洒洒無空缺雖居有為界示無為法而不滅壞有為之相雖居無為界示有為法而不分別無為之相如是則如鍾在虡扣之則鳴似鏡臨臺物來斯照於其中間應變萬差出沒卷舒得大自在祇如應真不借一句又作麼生雙溪源脉深無底濟物曾無有倦時復舉王常侍與臨濟至僧堂乃問這一堂僧還看經也無濟云不看經還習禪也無濟云不習禪侍云經又不看禪又不習畢竟作什麼濟云總教成佛作祖去侍云金屑雖貴落眼成翳濟云我將為你是箇俗漢師云風行草偃葉落知秋臨濟雖本分鉗鎚常侍乃頂門具眼祇如今日判府殿撰正言入山與老僧相見雖無僧堂可至亦無佛法商量祇者便是出佗一頭地處且道以何為驗以此為驗上堂舉趙州和尚一日見僧來便面壁書梵字僧展坐具禮三拜州轉身僧収坐具便行州云苦苦僧撫掌呵呵大笑師云苦苦苦中苦樂中苦誰道黃金如糞土象骨老師曾琨毬秘魔扠下捉老鼠上堂舉僧問雲門殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔門云露師云光孝著一轉語不是老僧見處亦非垂手為人何故豈不見道字經三寫烏焉成馬上堂舉灌溪初參臨濟纔跨門濟驀𮌎擒住溪便云領領濟便托開師云灌溪氣宇如王被臨濟活埋在鎮州十字街頭當時若是光孝棒折也未放佗在何故家肥生孝子國覇有謀臣上堂舉龍牙和尚道雲居師兄得第二句我得第一句西院云祇如龍牙與麼道還扶得也無雲門云須禮拜雲居始得西院云傍觀者哂師云龍牙若非西院當頭坐斷幾乎打破蔡州雲門冷處著把火義出豐年光孝過犯彌天一任諸方檢點再住歸宗禪寺語錄嗣法門人守詮等編入寺上堂僧問灌溪初參臨濟纔跨門濟驀𮌎擒住未審是何宗旨師云無宗旨進云灌溪見箇什麼道理便云領領師云無道理可見進云爭柰眼似銅鈴轉師云你向什麼處見二老宿僧便喝師云蝦跳不出斗師乃云大道無方所從容寰海間幾思歸隱處安樂在廬山如是也周旋舊日家風豈敢忘更途轍再禮耶舍相好重瞻拭眼慈容祇要聲和響順形直影端所以道拈起也天回地轉應須拱手歸降放下也草偃風行必合全身遠害在彼在此本無間然一去一來豈有二相雖然猶是業識茫茫且風恬浪靜一句作麼生道雲靜日月正雪晴天地春上堂寶劒未施盡大地人喪身失命古鏡未彰盡十方世界向甚處出頭這般野狐見解是諸方普請會底汝等諸人作麼生折合片雲歸洞晚斜日去天低入羅漢五臟示眾云黃面老人乾屎橛參隨一火爛泥團心肝腸胃皆條直𮒄飯茶花照膽寒佛法雖然未夢見神通却許入雲端應須痛念歸宗寺時復持盂下翠巒上堂云三十二相八十種好從朝至暮啾啾唧唧說黃道黑不知那裏是二時上堂喫粥喫飯不覺嚼破舌頭血濺梵天四天之下霈然有餘玉皇大帝惡發追東海龍王向金輪峰頂鞫勘頃刻之間追汝諸人作證見也且各請依實供通切忌回避儻若不實喪汝性命上堂舉僧問徑山掩息如灰時如何山云猶是時人功幹僧云幹後如何山云耕人田不種僧云畢竟如何山云禾熟不臨場師云鳳閤香沉雪巢夜冷半窻明月和氣䔽然正恁麼時且道歸宗與徑山還有相見分也無見與不見即且置祇如這僧問徑山還具眼麼苟或未然雲藏無縫襖鳥宿不萌枝萬杉和尚到上堂大底大小底小長底長短底短曲底曲直底直方底方圓底圓正底正邪底邪為復是佛耶是菩薩耶是羅漢耶是聖僧耶是鬼神耶是天仙耶我昔聞是法未甞妄宣說是義非義是隨義隨非是非義非非義是隨句墮若作佛法商量達磨一宗掃土而盡不作佛法商量老僧活陷地獄是你諸人還緇素得出麼苟或未然少間下座同知事頭首攀請新萬杉和尚為眾說破上堂舉僧問梁山和尚家賊難防時如何山云識得後不為冤僧云識得後如何山云貶向無生國裏僧云莫便是佗放身立命處也無山云死水不藏龍僧云如何是活水龍山云興雲不吐霧僧云忽遇傾湫倒岳來時如何山下禪床把住云莫教濕却老僧袈裟角師云梁山和尚與賊相戰兵刃交接填然鼓之雖不弃甲曳兵而走要且祇解戰賊不能殺賊忽有人問歸宗家賊難防時如何劈脊便棒何故豈不見道齊之以禮上堂舉百丈和尚示眾云汝開田了我與汝說大義僧云開田了請和尚說大義丈展兩手白雲端和尚拈云百丈說大義祇於此當時再參馬祖底向什麼處去也若言更有在未免與蛇𦘕足且道作麼生得知百丈老人立地處乃云客來無茶點蒿湯備禮儀師云白雲要見百丈再參馬祖底道理直是好笑笑須三十年又道作麼生得知百丈立地處也與笑三十年客來無茶點蒿湯備禮儀也與笑三十年三笑而九十年為復笑白雲批判未當為復別有道理汝諸人若撿點得出歸宗拄杖子兩手分付苟或未然幾度醉歸明月夜笙歌引入𦘕堂前上堂舉溈山問雲巖云承聞子在藥山是否巖云是溈云藥山大人相作麼生巖云涅槃後有山云如何是涅槃後有巖云水洒不著雲巖却問未審百丈大人相作麼生山云巍巍堂堂煒煒煌煌聲前非聲色後非色蚊子上鐵牛無你下觜處師云二尊宿說大人相何異指鹿為馬忽有人問歸宗虎丘大人相作麼生祗對佗道九九百百半青半白上堂舉睦州示眾云裂開也在我揑聚也在我有僧問云如何是裂開州云三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生僧云某甲不與麼道州云盞子落地楪子成七片雲峰悅云相罵饒你接觜相唾饒你潑水師云我且問你諸人雲峰恁麼拈提為復是見睦州意耶明睦州語耶歸宗因行不妨掉臂不是禪不是道不是玄不是妙久立伏惟珍重上堂僧問藥山小參不點燈德山小參不答話未審意旨如何師云二俱瞎漢僧云可謂端居坐底人意氣衝斗牛師云不是這箇道理僧云恩深轉無語懷抱自分明師云切忌錯承當僧又問崇壽和尚道識得橙子周匝有餘未審和尚還肯佗也無師云老僧深肯佗僧云雲門道識得橙子天地懸殊又作麼生師云穿却鼻孔僧云澤廣藏山理能伏豹又作麼生師云君子懷義僧云還許學人露箇消息也無師云有何不可僧云犀因翫月紋生角象被雷驚花入牙師云猶帶文彩在僧禮拜師乃云識得橙子周匝有餘識得橙子天地懸殊若向周匝有餘處會理上偏枯若向天地懸殊處會事上偏枯且道歸宗為人在什麼處犀因翫月紋生角象被雷驚花入牙上堂舉丹霞訪忠國師值國師睡次乃問侍者國師在否者云在則在祇是不見客霞云太深遠生者云莫道上座佛眼也不見霞云龍生龍子鳳生鳳兒國師睡起侍者舉似國師師打侍者二十棒趕出院霞聞云不謬為南陽國師師云侍者喫棒出院盖千載一時然歸宗豈免眼熱丹霞故雖好手爭柰落在國師網子裏諸人還辨得麼苟或未然猶握金鞭問歸客夜深誰共御街行上堂舉弘覺禪師一日問僧看者是什麼經僧云維摩經弘覺云我不問維摩經看者是什麼經其僧言下知歸師云可憐者僧被弘覺活埋在荒草裏諸人若定當得出明窻下安排苟或未然一任敲甎打瓦上堂三世諸佛六代祖師天下老和尚三十三天二十八宿盡在歸宗拄杖頭上結夏歸宗為伊說一字法門過去恒沙劫有寶花王如來分付老僧向二千一百丹五載後對眾顯示我等比丘今正是時且道一字法門作麼生說驀拈拄杖卓一卓云唵薩哩嚩吽㗶吒娑訶復有偈舉似大眾金錫罷游留靠壁草鞋乾曬待秋風且那長夏深思省看是平生有底功真實行藏宜保惜虗頭伎倆疾消鎔老僧豈是多饒舌要與諸人氣味同上堂召大眾云不著佛求不著法求不著僧求盞子落地楪子成七片胡張三黑李四知佗是有耶是無耶歸宗若放過燈籠露柱若草若木盡欺你諸人去也若不放過你諸人如何湊泊驀拈拄杖卓一卓云我見燈明佛本光瑞如此請監收上堂僧問三玄三要即不問時節因緣事若何師云狗齩枯骨進云臨濟示眾云一人常在途中不離家舍一人常在家舍不離途中未審意旨作麼生師云鐵蛇鑽不入進云忽若有人出來掀倒禪床又作麼生師云賊過後張弓進云未審此二人那箇受得人天供養師云總受不得進云人人具足箇箇圓成為什麼受道不得師云且緩緩僧問廣達咨和尚三通鼓罷大眾雲臻請師說法師云達進云莫恠渠儂多意氣佗家曾踏上頭關師云你被老僧達殺了也進云和尚祇有殺人刀且無活人劒師云如何是活人劒進云喝下已分泥水路箇中消息有誰知師云如何是殺人刀僧云已在言前師云何曾道著師乃云古來為法老尊宿荷眾曾無有倦時況是年來衰落甚動為多與行相違應須痛念平生事著意披襟善護持顆粒果能無滲漏少林初不隔毫釐江州東林太平興龍禪寺語錄嗣法門人守詮等編師入方丈據坐云西天四七唐土二三盡向者裏釘樁搖櫓新東林為你諸人解纜放船未說超宗異目若得齊眉共矚亦可明窻下安排苟或如之若何未免欄腮摑出上堂舉安國問僧得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺䔧之園我要箇語具得失兩意僧竪起拳頭云不可喚作拳頭國云祇為喚作拳頭雪竇拈云無繩自縛漢拳頭也不識師云若見得雪竇徹便見安國龍頭蛇尾若見不徹伊蘭作栴檀之樹甘露乃蒺䔧之園上堂舉丹霞因過一院值凝寒遂於殿中見木佛乃取燒火向院主偶見呵責曰何得燒我木佛霞以杖撥灰云吾燒取舍利主云木佛何有舍利霞云既無舍利更請兩尊再取燒之院主自後眉鬚墮落師云諸方商量道院主忽起疑心而致斯禍又云院主天寒不與丹霞火向致令燒却木佛遂乃眉鬚墮落殊不知院主買鐵得金一場富貴上堂舉僧問興化四方八面來時如何興化云打中間底僧便禮拜化云昨日赴箇村齋中路值一陣狂風暴雨向古廟裏避得過師云眾中商量道向古廟裏避得過是明空劫已前自己又道便是佗安身立命處殊不知興化腰纏十萬貫騎鶴下揚州上堂鷲嶺拈花少林直指指空畫空泥裏洗土如來禪烈焰光中綻白蓮祖師意海底紅塵成陣起透得過權實照用一鎚打破透不過葛藤窠裏長年打坐總不與麼喚取瞎驢來拽磨上堂舉教中道心佛及眾生是三無差別師云三十年前聞恁麼道笑而不已三十年後聞恁麼道喜而不寐是汝諸人聞東林恁麼道還緇素得出麼若緇素不出聽取一頌心佛及眾生笑而還復喜笑喜本無根緇素誠有旨千古萬古人幾箇識道理道理深何處尋驀拈拄杖卓一卓云海枯終見底人死不知心上堂舉僧問雲門不離三德六味還有佛法也無門云祇怕你不問僧云請師道門云三德六味施佛及僧師云雲門不負者僧來問未免落在陷穽中是你諸人若向者裏會得許你高步毗盧頂
